<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ReCircula 360 - Plataforma de sistematización</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="constants.js"></script>
  <script src="app.js" defer></script>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo grad-text">ReCircula 360</div>
    <div class="login-tagline">Plataforma de sistematización</div>
    <button class="login-google-btn" onclick="iniciarLogin()">
      <svg class="login-google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <p class="login-domain-note">Solo cuentas @redesconrostro.org</p>
  </div>
</div>

<!-- PANTALLA LOADING -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando ReCircula 360...</div>
</div>

<!-- APP PRINCIPAL -->
<div id="screen-app" class="hidden">
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo grad-text">ReCircula 360</div>
      <div class="sb-sub">Redes Con Rostro</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Principal</div>
      <div class="sb-item active" onclick="navTo('dashboard')" id="nav-dashboard">
        <i class="ti ti-chart-bar"></i> Dashboard
      </div>
      <div class="sb-item" onclick="navTo('entregas')" id="nav-entregas">
        <i class="ti ti-package"></i> Entregas
      </div>
      <div class="sb-item" onclick="navTo('asociaciones')" id="nav-asociaciones">
        <i class="ti ti-building-community"></i> Asociaciones
      </div>
      <div class="sb-item" onclick="navTo('accesos')" id="nav-accesos">
        <i class="ti ti-link"></i> Accesos
      </div>
      <div class="sb-section" style="margin-top:8px">Admin</div>
      <div class="sb-item admin-only hidden" onclick="navTo('configuracion')" id="nav-configuracion">
        <i class="ti ti-settings"></i> Configuración
      </div>
    </div>
    <div class="sb-foot">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="ti ti-logout"></i> Cerrar sesión
      </button>
    </div>
  </nav>
  <div class="main-area">
    <div class="main-topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="ti ti-menu-2"></i>
      </button>
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="main-content" id="main-content"></div>
  </div>
</div>

<div id="toast"></div>
</body>
</html>
