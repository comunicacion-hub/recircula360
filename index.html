<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCircula 360 - Plataforma de sistematización</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ============================================================
   RECIRCULA 360 — Estilos globales
   ============================================================ */

/* ── Tokens de diseño ───────────────────────────────────── */
:root {
  --b1: #002343;
  --b2: #0778bf;
  --g1: #5bbd70;
  --g2: #00bda4;
  --c1: #86d2da;
  --c2: #079fff;
  --tx: #1b1b1b;
  --tm: #5a6a7a;
  --tl: #9aafbe;
  --bg: linear-gradient(135deg, #e4f4fb, #eef4ff, #e4fbf7);
  --surface: #ffffff;
  --border: rgba(0, 35, 67, 0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --sidebar-w: 224px;
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Utilidades ─────────────────────────────────────────── */
.hidden { display: none !important; }

.grad-text {
  background: linear-gradient(90deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Botones ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: opacity 0.15s, transform 0.1s, background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #fff; border-color: var(--b2); color: var(--b2); }
.btn-primary:hover { background: #f0f7ff; }
.btn-success { background: #fff; border-color: var(--g2); color: var(--g2); }
.btn-success:hover { background: #f0fbf8; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-danger:hover { background: #fff0f3; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-sm { padding: 6px 13px; font-size: 12px; }

/* ── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 18px 20px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-tag {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--b2);
  background: #e8f4fb;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e4f4fb; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-cyan  { background: #e4f8fb; color: #0569a0; }
.badge-warn  { background: #fff8e4; color: #854f0b; }
.badge-red   { background: #fff0f3; color: #c91a44; }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--b1);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Spinner ─────────────────────────────────────────────── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b2);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   LOGIN
   ============================================================ */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 48px 44px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0, 35, 67, 0.08);
}

.login-logo {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.login-tagline {
  font-size: 13px;
  color: var(--tm);
  margin-bottom: 36px;
}

.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b2); }

.login-google-icon { width: 20px; height: 20px; }

.login-domain-note {
  margin-top: 16px;
  font-size: 11.5px;
  color: var(--tl);
}

/* ============================================================
   LOADING
   ============================================================ */
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.load-text {
  font-size: 14px;
  color: var(--tm);
  font-weight: 500;
}

/* ============================================================
   APP PRINCIPAL
   ============================================================ */
#screen-app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: transform 0.25s;
}

.sb-head {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sb-logo { font-size: 17px; font-weight: 800; }

.sb-sub {
  font-size: 11px;
  color: var(--tm);
  margin-top: 2px;
}

.sb-nav {
  padding: 12px 10px;
  flex: 1;
  overflow-y: auto;
}

.sb-section {
  font-size: 10px;
  font-weight: 700;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 10px 10px 4px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--tm);
  margin-bottom: 2px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.sb-item:hover { background: #f0f7fb; color: var(--b2); }
.sb-item.active {
  background: linear-gradient(135deg, #e4f4fb, #eef8ff);
  color: var(--b1);
  font-weight: 600;
}
.sb-item i { font-size: 18px; flex-shrink: 0; }
.sb-item.admin-only { color: #b8c8d4; }
.sb-item.admin-only:hover { background: #f8fbfd; color: var(--tl); }

.sb-foot {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}

.user-chip { display: flex; align-items: center; gap: 10px; }

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.user-name { font-size: 13px; font-weight: 600; color: var(--tx); }
.user-role { font-size: 11px; color: var(--tm); }

.btn-logout {
  margin-top: 10px;
  width: 100%;
  padding: 7px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }

/* ── Área principal ──────────────────────────────────────── */
.main-area {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 12px;
}

.topbar-title { font-size: 19px; font-weight: 700; color: var(--b1); }
.topbar-sub   { font-size: 12px; color: var(--tm); margin-top: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.mobile-menu-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  color: var(--b1);
  font-size: 20px;
  flex-shrink: 0;
}

.main-content {
  flex: 1;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ============================================================
   FILTROS SUPERIORES
   ============================================================ */
.filters-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: #fff;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 11px 16px;
}

.filter-label-inline {
  font-size: 11px;
  font-weight: 600;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.filter-select-sm {
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 12.5px;
  color: var(--tx);
  background: #f8fbfd;
  cursor: pointer;
  min-width: 110px;
  transition: border-color 0.15s;
}
.filter-select-sm:focus { outline: none; border-color: var(--b2); }

.filter-divider {
  width: 1px; height: 22px;
  background: var(--border);
  margin: 0 2px;
}

.btn-reset-filters {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tl);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s, border-color 0.15s;
}
.btn-reset-filters:hover { color: var(--b2); border-color: var(--b2); }

/* ============================================================
   PESTAÑAS
   ============================================================ */
.tabs-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  transition: color 0.15s, background 0.15s;
  font-family: 'Outfit', sans-serif;
}
.tab-btn:hover { color: var(--b2); }
.tab-btn.active {
  background: #fff;
  color: var(--b1);
  border-color: var(--border);
  margin-bottom: -1px;
}

/* ============================================================
   MODALES
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 35, 67, 0.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 35, 67, 0.15);
}

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

.modal-title { font-size: 16px; font-weight: 700; color: var(--b1); }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }

.modal-body { padding: 20px 24px; }

.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ============================================================
   FORMULARIOS
   ============================================================ */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
  transition: border-color 0.15s;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--b2);
  box-shadow: 0 0 0 3px rgba(7, 120, 191, 0.08);
}
.form-textarea { resize: vertical; min-height: 80px; }

.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.form-hint {
  font-size: 11px;
  color: var(--tl);
  margin-top: 4px;
}

/* ── Sección de materiales en formulario entrega ─────────── */
.materiales-section {
  background: #f8fbfd;
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border);
}

.materiales-section-title {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--b1);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

.material-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}

.material-row-label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--tx);
}

.material-priorizable {
  border-left: 3px solid var(--c2);
  padding-left: 8px;
}

.material-valor {
  font-size: 12px;
  font-weight: 600;
  color: var(--g2);
  text-align: right;
}

/* ============================================================
   TABLAS
   ============================================================ */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid #f0f4f8;
  color: var(--tx);
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }

.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }

/* ============================================================
   DASHBOARD — KPIs
   ============================================================ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.kpi-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  border: 1px solid var(--border);
}

.kpi-label {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--b1);
  line-height: 1;
}

.kpi-unit {
  font-size: 13px;
  font-weight: 400;
  color: var(--tm);
}

.kpi-note {
  font-size: 10.5px;
  color: var(--tl);
  margin-top: 4px;
}

.kpi-bar {
  height: 4px;
  border-radius: 4px;
  background: #eef2f6;
  margin-top: 10px;
  overflow: hidden;
}

.kpi-fill { height: 100%; border-radius: 4px; }
.kpi-fill-blue  { background: linear-gradient(90deg, var(--b1), var(--b2)); }
.kpi-fill-green { background: linear-gradient(90deg, var(--g1), var(--g2)); }
.kpi-fill-cyan  { background: linear-gradient(90deg, var(--c1), var(--c2)); }
.kpi-fill-warn  { background: linear-gradient(90deg, #f5ad21, #9fda60); }

/* ── Dashboard grids ─────────────────────────────────────── */
.dash-charts-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1.4fr);
  gap: 14px;
}

.dash-bottom-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 14px;
}

.dash-hist-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 14px;
}

/* ── Leyenda de gráficos ─────────────────────────────────── */
.chart-legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--tm);
}

.legend-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-line {
  width: 14px; height: 2.5px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Colectivos beneficiarios ────────────────────────────── */
.asoc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.asoc-chip {
  padding: 5px 9px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 500;
  background: #f0f7fb;
  color: var(--b1);
  border: 1px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Ranking compradores ─────────────────────────────────── */
.ranking-bar-bg {
  flex: 1;
  height: 7px;
  background: #f0f4f8;
  border-radius: 4px;
  overflow: hidden;
}

.ranking-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--b1), var(--b2));
}

/* ── Cilindros de avance ─────────────────────────────────── */
.cylinders-wrap {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  height: 110px;
  padding: 0 8px;
}

.cyl-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.cyl-pct {
  font-size: 13px;
  font-weight: 700;
  color: var(--b1);
}

.cyl-outer {
  width: 34px; height: 70px;
  border-radius: 17px;
  background: #eef2f6;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.cyl-fill {
  width: 100%;
  border-radius: 17px;
  transition: height 0.6s ease;
}

.cyl-name {
  font-size: 10px;
  color: var(--tm);
  font-weight: 500;
  text-align: center;
}

/* ============================================================
   ACCESOS
   ============================================================ */
.accesos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbzoOqPPbbOGh894CiDXny-8l44vp7JhluXcdORGz6s4dx_JDgOSX2ZXsPpGxfBJ59XK/exec';

const DRIVE_FOLDER_ROOT = '1AQyBa9AAdVzukBaZxWa7jpSN2DYkoFhv';

const SHEETS_API = 'https://sheets.googleapis.com/v4/spreadsheets';

// ── Estado global ────────────────────────────────────────────
let SESSION      = null;

function iniciarLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: G_CLIENT_ID,
    scope: 'email profile https://www.googleapis.com/auth/drive.file',
    callback: async (resp) => {
      if (resp.error) { showToast('Error al iniciar sesión'); return; }
      ACCESS_TOKEN = resp.access_token;
      TOKEN_EXPIRY = Date.now() + (resp.expires_in - 60) * 1000;
      await verificarUsuario();
    },
  });
  client.requestAccessToken();
}

async function verificarUsuario() {
  mostrarLoading();
  try {
    // Obtener info del usuario desde Google
    const res  = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN }
    });
    const info = await res.json();

    // Validar dominio
    if (!info.email.endsWith('@' + DOMAIN)) {
      showToast('Solo cuentas @' + DOMAIN + ' tienen acceso');
      mostrarLogin();
      return;
    }

    // Verificar usuario en el Sheet
    const data = await apiGet({ action: 'getUsuario', email: info.email });
    if (!data.ok) {
      showToast('Usuario no autorizado. Contacta al administrador.');
      mostrarLogin();
      return;
    }

    SESSION = {
      nombre: data.data.nombre || info.given_name,
      email:  info.email,
      rol:    data.data.rol,
      foto:   info.picture,
    };

    // Guardar sesión
    sessionStorage.setItem('rcr_session',   JSON.stringify(SESSION));
    sessionStorage.setItem('rcr_token',     ACCESS_TOKEN);
    sessionStorage.setItem('rcr_token_exp', TOKEN_EXPIRY);

    await iniciarApp();
  } catch (e) {
    console.error(e);
    showToast('Error de conexión. Intenta de nuevo.');
    mostrarLogin();
  }
}

function recuperarSesion() {
  const s   = sessionStorage.getItem('rcr_session');
  const t   = sessionStorage.getItem('rcr_token');
  const exp = sessionStorage.getItem('rcr_token_exp');
  if (s && t && exp && Date.now() < parseInt(exp)) {
    SESSION      = JSON.parse(s);
    ACCESS_TOKEN = t;
    TOKEN_EXPIRY = parseInt(exp);
    return true;
  }
  return false;
}

function cerrarSesion() {
  sessionStorage.clear();
  cacheClearAll();
  SESSION      = null;
  ACCESS_TOKEN = null;
  CAT          = { asociaciones: [], compradores: [], materiales: [], accesos: [] };
  mostrarLogin();
  try { google.accounts.id.disableAutoSelect(); } catch(e) {}
}

// ============================================================
// CACHÉ LOCAL CON TTL
// ============================================================
const CACHE_TTL = 30 * 60 * 1000; // 30 minutos

function cacheSet(key, data) {
  try {
    localStorage.setItem('rcr_' + key, JSON.stringify({ data, ts: Date.now() }));
  } catch(e) {}
}

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('rcr_' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('rcr_' + key); return null; }
    return data;
  } catch(e) { return null; }
}

function cacheClear(key) {
  try { localStorage.removeItem('rcr_' + key); } catch(e) {}
}

function cacheClearAll() {
  cacheClear('cat_todos');
}

async function cargarCatalogos() {
  try {
    // Leer desde caché primero
    const cached = cacheGet('cat_todos');
    if (cached) {
      CAT.asociaciones      = cached.asociaciones      || [];
      CAT.todasAsociaciones = cached.todasAsociaciones || [];
      CAT.compradores       = cached.compradores       || [];
      CAT.materiales        = cached.materiales        || [];
      CAT.accesos           = cached.accesos           || [];
      // Actualizar en segundo plano
      setTimeout(() => actualizarCatalogosBackground(), 200);
      return;
    }
    // Sin caché — cargar una sola llamada
    await actualizarCatalogos();
  } catch(e) {
    console.error('Error cargando catálogos:', e);
  }
}

async function actualizarCatalogos() {
  try {
    // Una sola llamada para todos los catálogos
    const res = await apiGet({ action: 'getCatalogos', rol: SESSION.rol });
    if (res.ok) {
      CAT.asociaciones      = res.data.asociaciones      || [];
      CAT.todasAsociaciones = res.data.todasAsociaciones || [];
      CAT.compradores       = res.data.compradores       || [];
      CAT.materiales        = res.data.materiales        || [];
      CAT.accesos           = res.data.accesos           || [];
      cacheSet('cat_todos', res.data);
    }
  } catch(e) {
    console.error('Error actualizando catálogos:', e);
  }
}

async function actualizarCatalogosBackground() {
  await actualizarCatalogos();
}

// Invalidar caché después de guardar datos
function invalidarCache(tipo) {

// ============================================================
// SHEETS API DIRECTA — Lectura rápida
// ============================================================

async function sheetsGet(sheetName, filtros = {}) {
  try {
    const url = `${SHEETS_API}/${SHEET_ID}/values/${encodeURIComponent(sheetName)}`;
    const res = await fetch(url, {
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN }
    });
    if (!res.ok) throw new Error('Error Sheets API');
    const json = await res.json();
    const rows = json.values || [];
    if (rows.length < 2) return [];
    const headers = rows[0];
    let data = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });
    // Aplicar filtros
    Object.entries(filtros).forEach(([key, val]) => {
      if (val) data = data.filter(r => r[key] === val);
    });
    return data;
  } catch(e) {
    console.error('Error Sheets API:', e);
    return null; // null indica fallo → fallback a Apps Script
  }
}

async function apiGet(params) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(SCRIPT_URL + '?' + qs);
  if (!res.ok) throw new Error('Error HTTP ' + res.status);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body:   JSON.stringify(body),
  });
  if (!res.ok) throw new Error('Error HTTP ' + res.status);
  return res.json();
}

// Subir archivo directo a Drive con token OAuth
async function subirDrive(file, folderId, nombre) {
  const metadata = {
    name:    nombre || file.name,
    parents: [folderId],
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);

  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {
      method:  'POST',
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN },
      body:    form,
    }
  );
  return res.json();
}

// ── Formateo ─────────────────────────────────────────────────
function fmtNum(n, dec = 2) {
  if (!n && n !== 0) return '—';
  return parseFloat(n).toLocaleString('es-EC', {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec,
  });
}

function fmtMoney(n) {
  if (!n && n !== 0) return '—';
  return '$' + parseFloat(n).toLocaleString('es-EC', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

function fmtTN(n) {
  if (!n && n !== 0) return '—';
  return fmtNum(n) + ' TN';
}

function fmtFecha(f) {
  if (!f) return '—';
  const d = new Date(f);
  if (isNaN(d)) return f;
  return d.toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── Helpers de listas ─────────────────────────────────────────
function optionsFromArray(arr, valField, labelField, selectedVal = '') {
  return arr.map(item =>
    `<option value="${item[valField]}" ${item[valField] === selectedVal ? 'selected' : ''}>
      ${item[labelField]}
    </option>`
  ).join('');
}

// ── Nivel de intermediación → badge ──────────────────────────
function nivelBadge(nivel) {
  const map = {
    'Nivel 1': 'badge-blue',
    'Nivel 2': 'badge-green',
    'Nivel 3': 'badge-warn',
    'Transformador': 'badge-cyan',
  };
  const cls = map[nivel] || 'badge-blue';
  return `<span class="badge ${cls}">${nivel || '—'}</span>`;
}

// CARGAR DATOS
// ============================================================

async function cargarDashboard() {
  try {
    const res = await apiGet({ action: 'getDashboard', ...DASH_FILTROS });
    if (!res.ok) { showToast('Error cargando dashboard'); return; }
    DASH_DATA = res.data;
    poblarFiltrosDisponibles(DASH_DATA.filtrosDisponibles);
    renderDashTab();
  } catch(e) {
    console.error(e);
    showToast('Error de conexión');
  }
}

function poblarFiltrosDisponibles(f) {
  if (!f) return;
  const selAnio = document.getElementById('f-anio');
  if (selAnio && f.anios) {
    const cur = DASH_FILTROS.anio;
    selAnio.innerHTML = '<option value="">Todos los años</option>' +
      f.anios.map(a => `<option value="${a}" ${a===cur?'selected':''}>${a}</option>`).join('');
  }
  const selCiudad = document.getElementById('f-ciudad');
  if (selCiudad && f.ciudades) {
    const cur = DASH_FILTROS.ciudad;
    selCiudad.innerHTML = '<option value="">Todas las ciudades</option>' +
      f.ciudades.map(c => `<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join('');
  }
}

function aplicarFiltro(campo, valor) {
  DASH_FILTROS[campo] = valor;
  cargarDashboard();
}

function resetFiltros() {
  DASH_FILTROS = { anio: '', mes: '', provincia: '', ciudad: '', asociacion: '' };
  ['f-anio','f-mes','f-provincia','f-ciudad','f-asociacion'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  cargarDashboard();
}

// ── Donut ──────────────────────────────────────────────────
function renderDonut(dist) {
  const colores = {
    'PET': '#002343', 'Plástico Duro': '#079fff', 'Plástico Suave': '#00bda4',
    'Cartón': '#f5ad21', 'Lata/Aluminio': '#9fda60', 'Vidrio': '#86d2da',
    'Chatarra': '#5bbd70', 'Cobre': '#f82d72', 'Otros': '#dde4ea',
  };
  const total = Object.values(dist).reduce((s, v) => s + (v || 0), 0);
  if (total === 0) return '<p style="color:var(--tl);font-size:13px">Sin datos</p>';

  const r = 55, cx = 65, cy = 65, circum = 2 * Math.PI * r;
  let offset = 0;
  const segs = Object.entries(dist).filter(([,v]) => v > 0).map(([nombre, valor]) => {
    const dash = (valor / total) * circum;
    const seg  = { nombre, valor, dash, offset, color: colores[nombre] || '#ccc' };
    offset += dash;
    return seg;
  });

  const circles = segs.map(s =>
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}"
      stroke-width="20" stroke-dasharray="${s.dash} ${circum - s.dash}"
      stroke-dashoffset="${-s.offset}" transform="rotate(-90 ${cx} ${cy})"/>`
  ).join('');

  const leyenda = segs.map(s =>
    `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${s.nombre} · ${fmtNum(s.valor)} TN</div>`
  ).join('');

  return `
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="position:relative;flex-shrink:0">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef2f6" stroke-width="20"/>
          ${circles}
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div style="font-size:14px;font-weight:700;color:var(--b1)">${fmtNum(total)}</div>
          <div style="font-size:9px;color:var(--tm)">TN total</div>
        </div>
      </div>
      <div class="chart-legend" style="flex-direction:column;gap:5px">${leyenda}</div>
    </div>`;
}

// ── Cilindro ──────────────────────────────────────────────
function renderCilindro(nombre, actual, meta, pct, gradient) {
  const pctLabel = meta > 0 ? ((actual / meta) * 100).toFixed(0) + '%' : '—';
  return `
    <div class="cyl-item">
      <div class="cyl-pct">${pctLabel}</div>
      <div class="cyl-outer">
        <div class="cyl-fill" style="height:${Math.min(pct,100)}%;background:${gradient}"></div>
      </div>
      <div class="cyl-name">${nombre}</div>
      <div style="font-size:9px;color:var(--tl);margin-top:2px">${fmtNum(actual)} / ${meta} TN</div>
    </div>`;
}

// ── Líneas por provincia ──────────────────────────────────
function renderLineChart(porProvMes, meses) {
  const W = 280, H = 85;
  const provConDatos = PROVINCIAS.filter(p => meses.some(m => porProvMes[p]?.[m] > 0));
  if (!provConDatos.length) return '<p style="color:var(--tl);font-size:13px">Sin datos</p>';

  let max = 0;
  provConDatos.forEach(p => meses.forEach(m => { if ((porProvMes[p]?.[m]||0) > max) max = porProvMes[p][m]; }));
  if (max === 0) max = 1;
  const stepX = W / (meses.length - 1);

  const lineas = provConDatos.map(p => {
    const pts = meses.map((m,i) => `${i*stepX},${H - ((porProvMes[p]?.[m]||0)/max)*(H-8)-4}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${COLORES_PROV[p]}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');

  const labels = [0,2,4,6,8,10,11].map(i =>
    `<text x="${i*stepX}" y="${H+13}" font-size="8" fill="#9aafbe" text-anchor="middle">${(meses[i]||'').substring(0,3)}</text>`
  ).join('');

  const leyenda = provConDatos.map(p =>
    `<div class="legend-item"><div class="legend-line" style="background:${COLORES_PROV[p]}"></div>${p}</div>`
  ).join('');

  return `
    <svg width="100%" viewBox="0 0 ${W} ${H+18}" style="overflow:visible">${lineas}${labels}</svg>
    <div class="chart-legend" style="margin-top:8px">${leyenda}</div>`;
}

// ── Ranking ───────────────────────────────────────────────
function renderRanking(ranking) {
  if (!ranking?.length) return '<p style="color:var(--tl);font-size:13px">Sin datos</p>';
  const maxTN = ranking[0]?.tnPET || 1;
  const filas = ranking.map(c => `
    <tr>
      <td style="font-weight:700;color:var(--b1)">${c.ranking}</td>
      <td>${c.nombre}</td>
      <td>${nivelBadge(c.nivel)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="ranking-bar-bg"><div class="ranking-bar-fill" style="width:${(c.tnPET/maxTN)*100}%"></div></div>
          <span style="font-size:11.5px;font-weight:600;white-space:nowrap">${fmtNum(c.tnPET)} TN</span>
        </div>
      </td>
      <td style="font-size:12px;color:var(--tm)">$${fmtNum(c.precioPETprom,2)}/kg</td>
    </tr>`).join('');

  return `<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Comprador</th><th>Nivel</th><th>TN PET</th><th>Precio prom.</th></tr></thead>
    <tbody>${filas}</tbody>
  </table></div>`;
}

function renderBarrasAnio(anios, porAnio, material, color) {
  if (!anios?.length) return `<div class="card"><div class="card-title">TN ${material}</div><p style="color:var(--tl)">Sin datos</p></div>`;
  const H  = 90;
  const maxVal = Math.max(...anios.map(a => porAnio[a]?.[material] || 0), 1);
  const titulo = material === 'Suave' ? 'Plástico suave' : material === 'Duro' ? 'Plástico duro' : 'PET';

  const grupos = anios.map(a => {
    const val = porAnio[a]?.[material] || 0;
    const h   = (val / maxVal) * H;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="height:${H}px;display:flex;align-items:flex-end">
          <div style="width:18px;height:${h}px;border-radius:3px 3px 0 0;background:${color}"></div>
        </div>
        <div style="font-size:8.5px;color:var(--tl)">${a}</div>
        <div style="font-size:9.5px;font-weight:600;color:var(--b1)">${fmtNum(val,0)}</div>
      </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-title">TN ${titulo}</div>
      <div style="display:flex;align-items:flex-end;gap:12px;justify-content:center;flex-wrap:wrap">${grupos}</div>
    </div>`;
}

function renderLineHistorico(anios, porProvAnio) {
  if (!anios || anios.length < 2) return '<p style="color:var(--tl);font-size:13px">Se necesitan al menos 2 años de datos</p>';
  const W = 500, H = 90;
  const stepX = W / (anios.length - 1);
  const provConDatos = PROVINCIAS.filter(p => anios.some(a => (porProvAnio[p]?.[a] || 0) > 0));

  let max = 0;
  provConDatos.forEach(p => anios.forEach(a => { if ((porProvAnio[p]?.[a]||0) > max) max = porProvAnio[p][a]; }));
  if (max === 0) max = 1;

  const lineas = provConDatos.map(p => {
    const pts = anios.map((a,i) => `${i*stepX},${H - ((porProvAnio[p]?.[a]||0)/max)*(H-8)-4}`).join(' ');
    const dots = anios.map((a,i) => `<circle cx="${i*stepX}" cy="${H-((porProvAnio[p]?.[a]||0)/max)*(H-8)-4}" r="3.5" fill="${COLORES_PROV[p]}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${COLORES_PROV[p]}" stroke-width="2" stroke-linejoin="round"/>${dots}`;
  }).join('');

  const labels = anios.map((a,i) =>
    `<text x="${i*stepX}" y="${H+14}" font-size="9" fill="#9aafbe" text-anchor="middle">${a}</text>`
  ).join('');

  const leyenda = provConDatos.map(p =>
    `<div class="legend-item"><div class="legend-line" style="background:${COLORES_PROV[p]}"></div>${p}</div>`
  ).join('');

  return `
    <svg width="100%" viewBox="0 0 ${W} ${H+20}" style="overflow:visible">${lineas}${labels}</svg>
    <div class="chart-legend" style="margin-top:10px">${leyenda}</div>`;
}

// ============================================================
// CARGAR ENTREGAS
// ============================================================

async function cargarEntregas() {
  try {
    // Leer directamente desde Sheets API
    let data = await sheetsGet('Entregas');
    if (data === null) {
      // Fallback a Apps Script
      const res = await apiGet({ action: 'getEntregas', ...ENTREGAS_FILTROS });
      if (!res.ok) { showToast('Error cargando entregas'); return; }
      data = res.data;
    } else {
      // Enriquecer con nombres de asociación y comprador
      const asoMap = {};
      CAT.asociaciones.forEach(a => { asoMap[a['ID_Asociacion']] = a; });
      const comMap = {};
      CAT.compradores.forEach(c => { comMap[c['ID_Comprador']] = c; });
      data = data.map(r => ({
        ...r,
        _nombreAsociacion:  asoMap[r['ID_Asociacion']]?.['Nombre'] || '',
        _provinciaAsociacion: asoMap[r['ID_Asociacion']]?.['Provincia'] || '',
        _ciudadAsociacion:  asoMap[r['ID_Asociacion']]?.['Ciudad'] || '',
        _nombreComprador:   comMap[r['ID_Comprador']]?.['Nombre'] || '',
        _nivelComprador:    comMap[r['ID_Comprador']]?.['Nivel Intermediacion'] || '',
      }));
      // Aplicar filtros localmente
      if (ENTREGAS_FILTROS.anio)       data = data.filter(r => String(r['Año']) === ENTREGAS_FILTROS.anio);
      if (ENTREGAS_FILTROS.mes)        data = data.filter(r => r['Mes'] === ENTREGAS_FILTROS.mes);
      if (ENTREGAS_FILTROS.asociacion) data = data.filter(r => r['ID_Asociacion'] === ENTREGAS_FILTROS.asociacion);
    }
    ENTREGAS_DATA = data;

    // Poblar filtro de años
    const anios = [...new Set(ENTREGAS_DATA.map(r => String(r['Año'])).filter(Boolean))].sort();
    const selAnio = document.getElementById('ef-anio');
    if (selAnio) {
      const cur = ENTREGAS_FILTROS.anio;
      selAnio.innerHTML = '<option value="">Todos los años</option>' +
        anios.map(a => `<option value="${a}" ${a===cur?'selected':''}>${a}</option>`).join('');
    }

    renderTablaEntregas();
  } catch(e) {
    console.error(e);
    showToast('Error de conexión');
  }
}

function filtrarEntregas(campo, valor) {
  ENTREGAS_FILTROS[campo] = valor;
  cargarEntregas();
}

function resetFiltrosEntregas() {
  ENTREGAS_FILTROS = { anio: '', mes: '', asociacion: '' };
  ['ef-anio','ef-mes','ef-asociacion'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  cargarEntregas();
}

function renderTablaEntregas() {
  const wrap = document.getElementById('entregas-table-wrap');
  if (!wrap) return;

  if (!ENTREGAS_DATA.length) {
    wrap.innerHTML = `
      <div style="text-align:center;padding:50px;color:var(--tl)">
        <i class="ti ti-package" style="font-size:40px;display:block;margin-bottom:12px"></i>

// ── Calcular valor en tiempo real ─────────────────────────
function calcularValorMaterial(mid, nombre) {
  const kg     = parseFloat(document.getElementById('mat-kg-' + mid)?.value || 0);
  const precio = parseFloat(document.getElementById('mat-precio-' + mid)?.value || 0);
  const venta  = kg * precio;

  const el = document.getElementById('mat-venta-' + mid);
  if (el) el.textContent = venta > 0 ? fmtMoney(venta) : '—';

  // Recalcular total general
  let total = 0;
  document.querySelectorAll('[id^="mat-venta-"]').forEach(el => {
    const v = parseFloat(el.textContent.replace(/[$,]/g,'')) || 0;
    total += v;
  });
  const elTotal = document.getElementById('ent-total');
  if (elTotal) elTotal.textContent = fmtMoney(total);
}

// ============================================================

async function guardarEntrega(id) {
  const fecha     = document.getElementById('ent-fecha')?.value;
  const idAsoc    = document.getElementById('ent-asociacion')?.value;
  const idComp    = document.getElementById('ent-comprador')?.value;
  const nivel     = document.getElementById('ent-nivel')?.value;
  const obs       = document.getElementById('ent-obs')?.value;
  const archivos  = document.getElementById('ent-evidencias')?.files;

  if (!fecha || !idAsoc || !idComp) {
    showToast('Completa los campos obligatorios');
    return;
  }

  // Construir objeto de datos
  const data = {
    'ID_Entrega':          id || '',
    'Fecha':               fecha,
    'ID_Asociacion':       idAsoc,
    'ID_Comprador':        idComp,
    'Nivel Intermediacion': nivel,
    'Observaciones':       obs,
    'ID_Usuario':          SESSION.email,
  };

  // Recoger materiales
  const materiales = CAT.materiales.length > 0
    ? CAT.materiales.map(m => m['Nombre'])
    : ['PET','Plástico Suave','Plástico Duro','Lata Aluminio','Vidrio','Cartón','Chatarra','Cobre','Papel Archivo','Periódico','Soplado','Tetrapak'];

  materiales.forEach(nombre => {
    const mid    = nombre.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    const kg     = parseFloat(document.getElementById('mat-kg-' + mid)?.value || 0);
    const precio = parseFloat(document.getElementById('mat-precio-' + mid)?.value || 0);
    data[nombre + ' Kilos']  = kg;
    data[nombre + ' Precio'] = precio;
  });

  // Deshabilitar botón
  const btn = document.getElementById('btn-guardar-entrega');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...'; }

  try {
    const res = await apiPost({ action: 'saveEntrega', data });
    if (!res.ok) { showToast('Error: ' + (res.error || 'desconocido')); return; }

    // Subir evidencias a Drive si las hay
    if (archivos && archivos.length > 0 && res.folderId) {
      showToast('Subiendo evidencias...');
      for (const archivo of archivos) {
        await subirDrive(archivo, res.folderId, archivo.name);
      }
    }

    showToast(id ? 'Entrega actualizada ✓' : 'Entrega guardada ✓');
    cerrarModal();
    await cargarEntregas();
  } catch(e) {
    console.error(e);
    showToast('Error al guardar');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar entrega'; }
  }
}

async function guardarCompradorEntregas(id) {
  const nombre    = document.getElementById('com-nombre')?.value?.trim();
  const nivel     = document.getElementById('com-nivel')?.value;
  const provincia = document.getElementById('com-provincia')?.value?.trim();
  const destino   = document.getElementById('com-destino')?.value?.trim();
  const activo    = document.getElementById('com-activo')?.value === 'true';
  if (!nombre) { showToast('El nombre es obligatorio'); return; }
  const btn = document.getElementById('btn-guardar-com');
  if (btn) { btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Guardando...'; }
  try {
    const res = await apiPost({ action:'saveComprador', data:{
      ID_Comprador:id||'', Nombre:nombre,
      'Nivel Intermediacion':nivel,
      Provincia:provincia, 'Destino Final':destino, Activo:activo
    }});
    if (!res.ok) { showToast('Error: '+(res.error||'desconocido')); return; }
    showToast(id?'Comprador actualizado ✓':'Comprador creado ✓');
    invalidarCache('compradores');
    const coms = await apiGet({ action:'getCompradores' });
    if (coms.ok) CAT.compradores = coms.data;
    cerrarModal();
  } catch(e) { showToast('Error al guardar'); }
  finally { if (btn) { btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; } }
}

      ${categorias.map(c => `
        <div class="cat-chip ${c === ACCESOS_CAT_ACTIVA ? 'active' : ''}"
          onclick="filtrarAccesos('${c}')">
          ${c}
        </div>
      `).join('')}
    </div>

    </div>
  `;
}

// ============================================================
// FILTRAR POR CATEGORÍA
// ============================================================

function filtrarAccesos(cat) {
  ACCESOS_CAT_ACTIVA = cat;

  // Actualizar chips
  document.querySelectorAll('.cat-chip').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === cat);
  });

  const wrap = document.getElementById('accesos-grid-wrap');
  if (wrap) wrap.innerHTML = renderGridAccesos();
}

// ============================================================
// GRID DE ACCESOS
// ============================================================

function renderGridAccesos() {
  const filtrados = ACCESOS_CAT_ACTIVA === 'Todos'
    ? CAT.accesos
    : CAT.accesos.filter(a => a['Categoría'] === ACCESOS_CAT_ACTIVA);

  if (!filtrados.length) {
    return `
      <div style="text-align:center;padding:60px;color:var(--tl)">
        <i class="ti ti-link" style="font-size:40px;display:block;margin-bottom:12px"></i>
        No hay accesos en esta categoría
      </div>`;
  }

  const tarjetas = filtrados.map(a => `
    <a class="acceso-card" href="${a['URL']}" target="_blank" rel="noopener noreferrer">
      <div class="acceso-emoji">${a['Emoji'] || '🔗'}</div>
      <div class="acceso-nombre">${a['Nombre']}</div>
      <div class="acceso-cat">${a['Categoría'] || ''}</div>
      ${SESSION.rol === 'Admin' ? `
        <div style="display:flex;gap:6px;margin-top:4px" onclick="event.preventDefault()">
          <button class="btn btn-glass btn-sm" onclick="abrirFormAcceso('${a['ID']}')">
            <i class="ti ti-pencil"></i>

  return `<div class="accesos-grid">${tarjetas}</div>`;

// ============================================================
// GUARDAR ACCESO
// ============================================================

async function guardarAcceso(id) {
  const nombre    = document.getElementById('acc-nombre')?.value?.trim();
  const url       = document.getElementById('acc-url')?.value?.trim();
  const emoji     = document.getElementById('acc-emoji')?.value?.trim();
  const categoria = document.getElementById('acc-categoria')?.value;
  const visible   = document.getElementById('acc-visible')?.value;
  const activo    = document.getElementById('acc-activo')?.value === 'true';

  if (!nombre || !url) {
    showToast('Nombre y URL son obligatorios');
    return;
  }

  const btn = document.getElementById('btn-guardar-acceso');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...'; }

  try {
    const data = {
      ID:            id || '',
      Nombre:        nombre,
      URL:           url,
      Emoji:         emoji || '🔗',
      'Categoría':   categoria,
      'Visible para': visible,
      Activo:        activo,
      email:         SESSION.email,
    };

    const res = await apiPost({ action: 'saveAcceso', data });
    if (!res.ok) { showToast('Error: ' + (res.error || 'desconocido')); return; }

    showToast(id ? 'Acceso actualizado ✓' : 'Acceso guardado ✓');
    cerrarModal();

    // Recargar catálogo de accesos
    const accs = await apiGet({ action: 'getAccesos', rol: SESSION.rol });
    if (accs.ok) CAT.accesos = accs.data;
    renderAccesos();
  } catch(e) {
    console.error(e);
    showToast('Error al guardar');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar'; }
  }
}

// ELIMINAR ACCESO
// ============================================================

function eliminarAcceso(id, nombre) {
  abrirModal(`
    <div class="modal" style="max-width:420px">
      <div class="modal-head">

        <button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button>

      <div class="modal-foot">

        </button>
      </div>

}

async function confirmarEliminarAcceso(id) {
  try {
    const res = await apiPost({ action: 'deleteRow', sheet: 'Accesos', id });
    if (!res.ok) { showToast('Error al eliminar'); return; }

    showToast('Acceso eliminado ✓');
    cerrarModal();

    const accs = await apiGet({ action: 'getAccesos', rol: SESSION.rol });
    if (accs.ok) CAT.accesos = accs.data;
    renderAccesos();
  } catch(e) {
    console.error(e);
    showToast('Error al eliminar');
  }
}

async function cargarAsociaciones() {
  try {
    // Usar Sheets API directa para lectura rápida
    const todas = await sheetsGet('Asociaciones');
    if (todas !== null) {
      ASOC_DATA = todas;
      CAT.asociaciones      = todas.filter(a => a['Estado'] === 'Activa');
      CAT.todasAsociaciones = todas;
    } else {
      // Fallback a Apps Script
      const res = await apiGet({ action: 'getAllAsociaciones' });
      ASOC_DATA = res.ok ? res.data : (CAT.todasAsociaciones || []);
    }
    renderTablaAsociaciones();
  } catch(e) {
    console.error(e);
    showToast('Error cargando asociaciones');
  }
}

function buscarAsociacion(val) {
  ASOC_BUSCAR = val.toLowerCase();
  renderTablaAsociaciones();
}

function filtrarEstadoAsoc(val) {
  ASOC_ESTADO = val;
  renderTablaAsociaciones();
}

function resetFiltrosAsoc() {
  ASOC_BUSCAR = '';
  ASOC_ESTADO = '';
  const b = document.getElementById('asoc-buscar');
  const e = document.getElementById('asoc-estado-f');
  if (b) b.value = '';

  renderTablaAsociaciones();

// ============================================================
// GUARDAR
// ============================================================

async function guardarAsociacion(id) {
  const nombre       = document.getElementById('aso-nombre')?.value?.trim();
  const provincia    = document.getElementById('aso-provincia')?.value;
  const ciudad       = document.getElementById('aso-ciudad')?.value?.trim();
  const tipo         = document.getElementById('aso-tipo')?.value;
  const estado       = document.getElementById('aso-estado')?.value;
  const recicladores = document.getElementById('aso-recicladores')?.value;
  const obs          = document.getElementById('aso-obs')?.value;

  if (!nombre) { showToast('El nombre es obligatorio'); return; }

  const btn = document.getElementById('btn-guardar-aso');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...'; }

  try {
    const data = {
      ID_Asociacion: id || '',
      Nombre: nombre,
      Provincia: provincia,
      Ciudad: ciudad,
      Tipo: tipo,
      Estado: estado,
      'Numero de Recicladores': recicladores,
      Observaciones: obs,
      'Fecha Ingreso': id ? '' : new Date().toISOString().substring(0, 10),
    };

    const res = await apiPost({ action: 'saveAsociacion', data });
    if (!res.ok) { showToast('Error: ' + (res.error || 'desconocido')); return; }

    // Si es nueva, crear carpeta en Drive automáticamente
    if (!id && res.id) {
      showToast('Creando carpeta en Drive...');
      await apiPost({ action: 'crearCarpetaAsoc', idAsociacion: res.id, nombre });
    }

    showToast(id ? 'Asociación actualizada ✓' : 'Asociación creada ✓');
    cerrarModal();
    invalidarCache('asociaciones');
    await cargarAsociaciones();
  } catch(e) {
    console.error(e);
    showToast('Error al guardar');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar'; }
  }
}

// ============================================================
// CREAR CARPETA DRIVE
// ============================================================

async function crearCarpetaAsociacion(idAsociacion, nombre) {
  showToast('Creando carpeta en Drive...');
  try {
    const res = await apiPost({ action: 'crearCarpetaAsoc', idAsociacion, nombre });
    if (res.ok) {
      showToast('Carpeta creada ✓');
      await cargarAsociaciones();
    } else {
      showToast('Error al crear carpeta');
    }
  } catch(e) {
    showToast('Error de conexión');
  }
}

        <div style="font-size:13px;color:var(--tl);margin-top:6px">Solo los administradores pueden acceder</div>
      </div>`;
    return;
  }

  document.getElementById('main-content').innerHTML = `
    <div class="tabs-bar">
      <button class="tab-btn active" id="cfg-tab-usuarios" onclick="switchConfigTab('usuarios')">
        <i class="ti ti-users"></i> Usuarios
      </button>
      <button class="tab-btn" id="cfg-tab-materiales" onclick="switchConfigTab('materiales')">
        <i class="ti ti-recycle"></i> Materiales
      </button>
      <button class="tab-btn" id="cfg-tab-ajustes" onclick="switchConfigTab('ajustes')">
        <i class="ti ti-settings-2"></i> Ajustes
      </button>
    </div>
    <div id="config-tab-content"></div>
  `;
  switchConfigTab('usuarios');
}

function switchConfigTab(tab) {
  CONFIG_TAB = tab;
  document.querySelectorAll('[id^="cfg-tab-"]').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('cfg-tab-' + tab);
  if (el) el.classList.add('active');
  switch (tab) {
    case 'usuarios':    renderUsuarios();    break;
    case 'materiales':  renderMateriales();  break;
    case 'ajustes':     renderAjustes();     break;
  }
}

function abrirFormUsuario(id = null) {

      </div>

        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" class="form-input" id="usr-nombre" value="${u?.['Nombre']||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" class="form-input" id="usr-email" value="${u?.['Email']||''}"
            placeholder="nombre@redesconrostro.org" ${u?'readonly style="background:#f8fbfd;color:var(--tm)"':''}>

              <option value="Visualizador" ${u?.['Rol']==='Visualizador'?'selected':''}>Visualizador</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Activo</label>
            <select class="form-select" id="usr-activo">
              <option value="true"  ${u?.['Activo']!==false?'selected':''}>Sí</option>
              <option value="false" ${u?.['Activo']===false?'selected':''}>No</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-foot">

        <button class="btn btn-primary" id="btn-guardar-usr" onclick="guardarUsuario('${id||''}')">
          <i class="ti ti-check"></i> ${u?'Actualizar':'Guardar'}
        </button>
      </div>
    </div>`);
}

async function guardarUsuario(id) {
  const nombre = document.getElementById('usr-nombre')?.value?.trim();
  const email  = document.getElementById('usr-email')?.value?.trim();
  const rol    = document.getElementById('usr-rol')?.value;
  const activo = document.getElementById('usr-activo')?.value === 'true';
  if (!nombre || !email) { showToast('Nombre y email son obligatorios'); return; }
  if (!email.endsWith('@' + DOMAIN)) { showToast('Solo cuentas @' + DOMAIN); return; }
  const btn = document.getElementById('btn-guardar-usr');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...'; }
  try {
    const res = await apiPost({ action: 'saveUsuario', data: { ID_Usuario:id||'', Nombre:nombre, Email:email, Rol:rol, Activo:activo }});
    if (!res.ok) { showToast('Error: '+(res.error||'desconocido')); return; }
    showToast(id?'Usuario actualizado ✓':'Usuario creado ✓');
    cerrarModal();
    await renderUsuarios();
  } catch(e) { showToast('Error al guardar'); }
  finally { if (btn) { btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; } }
}
