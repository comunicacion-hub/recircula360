<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ReCircula 360 - Plataforma de sistematización</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ============================================================
   RECIRCULA 360 — Estilos (optimizados, sin cambios visuales)
   ============================================================ */
:root {
  --b1: #002343;
  --b2: #0778bf;
  --g1: #5bbd70;
  --g2: #00bda4;
  --c1: #86d2da;
  --c2: #079fff;
  --tx: #1b1b1b;
  --tm: #5a6a7a;
  --tl: #9aafbe;
  --bg: linear-gradient(135deg, #e4f4fb, #eef4ff, #e4fbf7);
  --surface: #ffffff;
  --border: rgba(0, 35, 67, 0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --sidebar-w: 224px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
.hidden { display: none !important; }
.grad-text {
  background: linear-gradient(90deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: opacity 0.15s, transform 0.1s, background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #fff; border-color: var(--b2); color: var(--b2); }
.btn-primary:hover { background: #f0f7ff; }
.btn-success { background: #fff; border-color: var(--g2); color: var(--g2); }
.btn-success:hover { background: #f0fbf8; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-danger:hover { background: #fff0f3; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-sm { padding: 6px 13px; font-size: 12px; }
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 18px 20px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-tag {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--b2);
  background: #e8f4fb;
  padding: 3px 10px;
  border-radius: 20px;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e4f4fb; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-cyan  { background: #e4f8fb; color: #0569a0; }
.badge-warn  { background: #fff8e4; color: #854f0b; }
.badge-red   { background: #fff0f3; color: #c91a44; }
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--b1);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b2);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 48px 44px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0, 35, 67, 0.08);
}
.login-logo { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
.login-tagline { font-size: 13px; color: var(--tm); margin-bottom: 36px; }
.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b2); }
.login-google-icon { width: 20px; height: 20px; }
.login-domain-note { margin-top: 16px; font-size: 11.5px; color: var(--tl); }
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.load-text { font-size: 14px; color: var(--tm); font-weight: 500; }
#screen-app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: transform 0.25s;
}
.sb-head { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
.sb-logo { font-size: 17px; font-weight: 800; }
.sb-sub { font-size: 11px; color: var(--tm); margin-top: 2px; }
.sb-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
.sb-section { font-size: 10px; font-weight: 700; color: var(--tl); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 10px 4px; }
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--tm);
  margin-bottom: 2px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.sb-item:hover { background: #f0f7fb; color: var(--b2); }
.sb-item.active {
  background: linear-gradient(135deg, #e4f4fb, #eef8ff);
  color: var(--b1);
  font-weight: 600;
}
.sb-item i { font-size: 18px; flex-shrink: 0; }
.sb-item.admin-only { color: #b8c8d4; }
.sb-item.admin-only:hover { background: #f8fbfd; color: var(--tl); }
.sb-foot { padding: 14px 16px; border-top: 1px solid var(--border); }
.user-chip { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--tx); }
.user-role { font-size: 11px; color: var(--tm); }
.btn-logout {
  margin-top: 10px;
  width: 100%;
  padding: 7px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }
.main-area {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 12px;
}
.topbar-title { font-size: 19px; font-weight: 700; color: var(--b1); }
.topbar-sub { font-size: 12px; color: var(--tm); margin-top: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.mobile-menu-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  font-size: 20px;
  flex-shrink: 0;
}
.main-content { flex: 1; padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
.filters-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: #fff;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 11px 16px;
}
.filter-label-inline { font-size: 11px; font-weight: 600; color: var(--tl); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
.filter-select-sm {
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 12.5px;
  color: var(--tx);
  background: #f8fbfd;
  cursor: pointer;
  min-width: 110px;
}
.filter-select-sm:focus { outline: none; border-color: var(--b2); }
.filter-divider { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }
.btn-reset-filters {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tl);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn-reset-filters:hover { color: var(--b2); border-color: var(--b2); }
.tabs-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
}
.tab-btn:hover { color: var(--b2); }
.tab-btn.active {
  background: #fff;
  color: var(--b1);
  border-color: var(--border);
  margin-bottom: -1px;
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 35, 67, 0.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 35, 67, 0.15);
}
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--b1); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }
.modal-body { padding: 20px 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--b2);
  box-shadow: 0 0 0 3px rgba(7, 120, 191, 0.08);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--tl); margin-top: 4px; }
.materiales-section {
  background: #f8fbfd;
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border);
}
.materiales-section-title {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--b1);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}
.material-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.material-row-label { font-size: 12.5px; font-weight: 500; color: var(--tx); }
.material-priorizable { border-left: 3px solid var(--c2); padding-left: 8px; }
.material-valor { font-size: 12px; font-weight: 600; color: var(--g2); text-align: right; }
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid #f0f4f8;
  color: var(--tx);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }
.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }
.kpi-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
.kpi-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  border: 1px solid var(--border);
}
.kpi-label { font-size: 10.5px; font-weight: 600; color: var(--tm); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--b1); line-height: 1; }
.kpi-unit { font-size: 13px; font-weight: 400; color: var(--tm); }
.kpi-note { font-size: 10.5px; color: var(--tl); margin-top: 4px; }
.kpi-bar { height: 4px; border-radius: 4px; background: #eef2f6; margin-top: 10px; overflow: hidden; }
.kpi-fill { height: 100%; border-radius: 4px; }
.kpi-fill-blue  { background: linear-gradient(90deg, var(--b1), var(--b2)); }
.kpi-fill-green { background: linear-gradient(90deg, var(--g1), var(--g2)); }
.kpi-fill-cyan  { background: linear-gradient(90deg, var(--c1), var(--c2)); }
.kpi-fill-warn  { background: linear-gradient(90deg, #f5ad21, #9fda60); }
.dash-charts-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1.4fr);
  gap: 14px;
}
.dash-bottom-row { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 14px; }
.dash-hist-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--tm); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-line { width: 14px; height: 2.5px; border-radius: 2px; flex-shrink: 0; }
.asoc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.asoc-chip {
  padding: 5px 9px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 500;
  background: #f0f7fb;
  color: var(--b1);
  border: 1px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ranking-bar-bg { flex: 1; height: 7px; background: #f0f4f8; border-radius: 4px; overflow: hidden; }
.ranking-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--b1), var(--b2)); }
.cylinders-wrap { display: flex; justify-content: space-around; align-items: flex-end; height: 110px; padding: 0 8px; }
.cyl-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.cyl-pct { font-size: 13px; font-weight: 700; color: var(--b1); }
.cyl-outer { width: 34px; height: 70px; border-radius: 17px; background: #eef2f6; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
.cyl-fill { width: 100%; border-radius: 17px; transition: height 0.6s ease; }
.cyl-name { font-size: 10px; color: var(--tm); font-weight: 500; text-align: center; }
.accesos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.acceso-card {
  background: #fff;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 16px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.acceso-card:hover { box-shadow: 0 4px 20px rgba(0, 35, 67, 0.1); transform: translateY(-2px); }
.acceso-emoji { font-size: 24px; }
.acceso-nombre { font-size: 13px; font-weight: 600; color: var(--tx); }
.acceso-cat { font-size: 11px; color: var(--tl); }
.cat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.cat-chip {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--tm);
  background: #fff;
  transition: all 0.15s;
  user-select: none;
}
.cat-chip.active {
  background: linear-gradient(135deg, var(--b1), var(--b2));
  color: #fff;
  border-color: transparent;
}
.config-section {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
}
.config-section-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f8fbfd;
}
.config-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--b1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.config-section-body { padding: 16px 20px; }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: 224px; }
  .sidebar.open { transform: translateX(0); }
  .main-area { margin-left: 0; }
  .main-content { padding: 14px 16px; }
  .mobile-menu-btn { display: flex; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .dash-charts-row { grid-template-columns: 1fr; }
  .dash-bottom-row { grid-template-columns: 1fr; }
  .dash-hist-grid  { grid-template-columns: 1fr; }
  .form-grid-2 { grid-template-columns: 1fr; }
  .form-grid-3 { grid-template-columns: 1fr; }
  .material-row { grid-template-columns: 1fr 1fr; }
  .accesos-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .accesos-grid { grid-template-columns: 1fr; }
  .main-topbar { padding: 12px 16px; }
}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo grad-text">ReCircula 360</div>
    <div class="login-tagline">Plataforma de sistematización</div>
    <button class="login-google-btn" onclick="iniciarLogin()">
      <svg class="login-google-icon" viewBox="0 0 24 24">

// Caché con TTL (30 min)
const CACHE_TTL = 30 * 60 * 1000;
function cacheSet(key, data) { try { localStorage.setItem('rcr_'+key, JSON.stringify({ data, ts: Date.now() })); } catch(e) {} }
function cacheGet(key) { try { const raw = localStorage.getItem('rcr_'+key); if(!raw) return null; const {data,ts}=JSON.parse(raw); if(Date.now()-ts > CACHE_TTL) { localStorage.removeItem('rcr_'+key); return null; } return data; } catch(e){ return null; } }
function cacheClear(key) { try { localStorage.removeItem('rcr_'+key); } catch(e){} }
function invalidarCache() { cacheClear('cat_todos'); cacheClear('entregas'); cacheClear('asociaciones'); cacheClear('dashboard'); }

// API helpers
async function apiGet(params) { const qs = new URLSearchParams(params).toString(); const res = await fetch(SCRIPT_URL + '?' + qs); if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); }
async function apiPost(body) { const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(body) }); if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); }

// Subir archivos a Drive con concurrencia limitada
async function subirArchivosConcurrente(files, folderId, onProgress) {
  const CONCURRENCIA = 3;
  const resultados = [];
  for(let i=0; i<files.length; i+=CONCURRENCIA) {
    const lote = files.slice(i, i+CONCURRENCIA);
    const promesas = lote.map(async (file) => {
      const form = new FormData();
      const metadata = { name: file.name, parents: [folderId] };
      form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
      form.append('file', file);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: { Authorization: 'Bearer '+ACCESS_TOKEN }, body: form
      });
      return res.json();
    });
    const loteRes = await Promise.all(promesas);
    resultados.push(...loteRes);
    if(onProgress) onProgress(Math.min(i+CONCURRENCIA, files.length), files.length);
  }
  return resultados;
}

// UI Helpers
function mostrarLogin() { document.getElementById('screen-login').classList.remove('hidden'); document.getElementById('screen-loading').classList.add('hidden'); document.getElementById('screen-app').classList.add('hidden'); }

function mostrarApp() { document.getElementById('screen-login').classList.add('hidden'); document.getElementById('screen-loading').classList.add('hidden'); document.getElementById('screen-app').classList.remove('hidden'); }
function showToast(msg, dur=3500) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), dur); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function fmtNum(n,dec=2) { if(!n && n!==0) return '—'; return parseFloat(n).toLocaleString('es-EC',{minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtMoney(n) { if(!n && n!==0) return '—'; return '$'+parseFloat(n).toLocaleString('es-EC',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtTN(n) { if(!n && n!==0) return '—'; return fmtNum(n)+' TN'; }
function fmtFecha(f) { if(!f) return '—'; const d=new Date(f); if(isNaN(d)) return f; return d.toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}); }
function nivelBadge(nivel) { const map={ 'Nivel 1':'badge-blue','Nivel 2':'badge-green','Nivel 3':'badge-warn','Transformador':'badge-cyan' }; const cls=map[nivel]||'badge-blue'; return `<span class="badge ${cls}">${nivel||'—'}</span>`; }

// Debounce helper
function debounce(fn, delay) { let timer; return function(...args) { clearTimeout(timer); timer = setTimeout(()=>fn.apply(this,args), delay); }; }

// ============================================================
// LOGIN / SESIÓN
// ============================================================
function iniciarLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: G_CLIENT_ID,
    scope: 'email profile https://www.googleapis.com/auth/drive.file',
    callback: async (resp) => {
      if(resp.error) { showToast('Error al iniciar sesión'); return; }
      ACCESS_TOKEN = resp.access_token;
      TOKEN_EXPIRY = Date.now() + (resp.expires_in - 60)*1000;
      await verificarUsuario();
    }
  });
  client.requestAccessToken();
}

async function verificarUsuario() {
  mostrarLoading();
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer '+ACCESS_TOKEN } });
    const info = await res.json();
    if(!info.email.endsWith('@'+DOMAIN)) { showToast('Solo cuentas @'+DOMAIN); mostrarLogin(); return; }
    const data = await apiGet({ action:'getUsuario', email: info.email });
    if(!data.ok) { showToast('Usuario no autorizado'); mostrarLogin(); return; }
    SESSION = { nombre: data.data.nombre || info.given_name, email: info.email, rol: data.data.rol, foto: info.picture };
    sessionStorage.setItem('rcr_session', JSON.stringify(SESSION));
    sessionStorage.setItem('rcr_token', ACCESS_TOKEN);
    sessionStorage.setItem('rcr_token_exp', TOKEN_EXPIRY);
    await iniciarApp();
  } catch(e) { console.error(e); showToast('Error de conexión'); mostrarLogin(); }
}

function recuperarSesion() {
  const s = sessionStorage.getItem('rcr_session');
  const t = sessionStorage.getItem('rcr_token');
  const exp = sessionStorage.getItem('rcr_token_exp');
  if(s && t && exp && Date.now() < parseInt(exp)) {
    SESSION = JSON.parse(s);
    ACCESS_TOKEN = t;
    TOKEN_EXPIRY = parseInt(exp);
    return true;
  }
  return false;
}

function cerrarSesion() {
  sessionStorage.clear();
  invalidarCache();
  SESSION = null; ACCESS_TOKEN = null;
  CAT = { asociaciones:[], compradores:[], materiales:[], accesos:[], todasAsociaciones:[] };
  mostrarLogin();
  try { google.accounts.id.disableAutoSelect(); } catch(e) {}
}

async function renderDashboard() {
  const content = document.getElementById('main-content');
  content.innerHTML = `

      <span class="filter-label-inline"><i class="ti ti-adjustments-horizontal"></i> Filtros</span>

      <select class="filter-select-sm" id="f-provincia" onchange="aplicarFiltro('provincia',this.value)"><option value="">Todas las provincias</option>${PROVINCIAS.map(p=>`<option value="${p}">${p}</option>`).join('')}</select>

    <div id="dash-tab-content"><div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div></div>
  `;

async function cargarDashboard() {
  try {
    const cacheKey = 'dashboard_'+JSON.stringify(DASH_FILTROS);
    const cached = cacheGet(cacheKey);
    if(cached) {
      DASH_DATA = cached;
      renderDashTab();
      return;
    }
    const res = await apiGet({ action:'getDashboard', ...DASH_FILTROS });
    if(res.ok) {
      DASH_DATA = res.data;
      cacheSet(cacheKey, res.data);
      renderDashTab();
      poblarFiltrosDisponibles(DASH_DATA.filtrosDisponibles);
    } else showToast('Error cargando dashboard');
  } catch(e) { showToast('Error de conexión'); }
}

function poblarFiltrosDisponibles(f) {
  if(!f) return;
  const selAnio = document.getElementById('f-anio');
  if(selAnio && f.anios) { const cur=DASH_FILTROS.anio; selAnio.innerHTML='<option value="">Todos los años</option>'+f.anios.map(a=>`<option value="${a}" ${a===cur?'selected':''}>${a}</option>`).join(''); }
  const selCiudad = document.getElementById('f-ciudad');
  if(selCiudad && f.ciudades) { const cur=DASH_FILTROS.ciudad; selCiudad.innerHTML='<option value="">Todas las ciudades</option>'+f.ciudades.map(c=>`<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join(''); }
}
function aplicarFiltro(campo, valor) { DASH_FILTROS[campo]=valor; cargarDashboard(); }
function resetFiltros() { DASH_FILTROS={ anio:'', mes:'', provincia:'', ciudad:'', asociacion:'' }; ['f-anio','f-mes','f-provincia','f-ciudad','f-asociacion'].forEach(id=>{const el=document.getElementById(id); if(el) el.value='';}); cargarDashboard(); }
function switchDashTab(tab) { DASH_TAB=tab; document.getElementById('tab-operativo').className='tab-btn'+(tab==='operativo'?' active':''); document.getElementById('tab-historico').className='tab-btn'+(tab==='historico'?' active':''); renderDashTab(); }
function renderDashTab() { if(!DASH_DATA) return; if(DASH_TAB==='operativo') renderOperativo(); else renderHistorico(); }
function renderOperativo() {
  const d = DASH_DATA;
  const k = d.kpis;
  const pctPET = METAS.PET>0 ? Math.min((k.tnPET/METAS.PET)*100,100):0;
  const pctSuave = METAS.Suave>0 ? Math.min((k.tnSuave/METAS.Suave)*100,100):0;
  const pctDuro = METAS.Duro>0 ? Math.min((k.tnDuro/METAS.Duro)*100,100):0;
  document.getElementById('dash-tab-content').innerHTML = `
    <div class="kpi-grid"><div class="kpi-card"><div class="kpi-label">Total TN recuperadas</div><div class="kpi-value">${fmtNum(k.totalTN)} <span class="kpi-unit">TN</span></div><div class="kpi-note">Todos los materiales</div></div>
    <div class="kpi-card"><div class="kpi-label">TN priorizables</div><div class="kpi-value">${fmtNum(k.tnPriorizables)} <span class="kpi-unit">TN</span></div><div class="kpi-note">PET + Suave + Duro</div></div>
    <div class="kpi-card"><div class="kpi-label">Ingresos venta PET</div><div class="kpi-value">${fmtMoney(k.ingresosPET)}</div><div class="kpi-note">Valor generado</div></div></div>
    <div class="dash-charts-row"><div class="card"><div class="card-title">TN recuperadas por material</div>${renderDonutCanvas(d.distribucion)}</div>
    <div class="card"><div class="card-title">Avance vs meta anual</div><div class="cylinders-wrap">${renderCilindro('PET',k.tnPET,METAS.PET,pctPET,'linear-gradient(180deg,#0778bf,#002343)')}${renderCilindro('Duro',k.tnDuro,METAS.Duro,pctDuro,'linear-gradient(180deg,#079fff,#86d2da)')}${renderCilindro('Suave',k.tnSuave,METAS.Suave,pctSuave,'linear-gradient(180deg,#5bbd70,#00bda4)')}</div></div>
    <div class="card"><div class="card-title">TN PET mensual por provincia</div><canvas id="lineChartCanvas" width="400" height="180" style="width:100%;height:auto;max-width:400px"></canvas><div id="chartLegend"></div></div></div>
    <div class="dash-bottom-row"><div class="card"><div class="card-title">Ranking compradores · PET <span class="card-tag">${d.ranking.length} compradores</span></div>${renderRanking(d.ranking)}</div>
    <div class="card"><div class="card-title">Colectivos beneficiarios <span class="card-tag">${d.colectivos.length} asociaciones</span></div><div class="asoc-grid">${d.colectivos.map(c=>`<div class="asoc-chip" title="${c}">${c}</div>`).join('')}</div></div></div>`;
  setTimeout(()=>dibujarLineChart(d.porProvMes, d.meses), 50);
}
function renderDonutCanvas(dist) {
  const total = Object.values(dist).reduce((s,v)=>s+(v||0),0);
  if(total===0) return '<p style="color:var(--tl)">Sin datos</p>';
  const canvasId = 'donutCanvas_'+Math.random();
  setTimeout(()=>{
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w=150, h=150;
    canvas.width=w; canvas.height=h;
    const colores = { 'PET':'#002343','Plástico Duro':'#079fff','Plástico Suave':'#00bda4','Cartón':'#f5ad21','Lata/Aluminio':'#86d2da','Vidrio':'#5bbd70','Chatarra':'#f82d72','Cobre':'#9fda60','Papel Archivo':'#0778bf','Periódico':'#00bda4','Soplado':'#86d2da','Tetrapak':'#9fda60','Suela':'#f5ad21','Bronce':'#5bbd70','Batería':'#002343','Acero':'#079fff' };
    let start= -Math.PI/2;
    const entries = Object.entries(dist).filter(([,v])=>v>0);
    for(let [nombre, valor] of entries) {
      const angulo = (valor/total)*2*Math.PI;
      ctx.beginPath();
      ctx.fillStyle = colores[nombre] || '#ccc';
      ctx.moveTo(w/2,h/2);
      ctx.arc(w/2,h/2,w/2-10, start, start+angulo);
      ctx.fill();
      start += angulo;
    }
  },10);
  return `<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap"><canvas id="${canvasId}" width="150" height="150" style="width:150px;height:150px"></canvas><div class="chart-legend" style="flex-direction:column;gap:5px">${Object.entries(dist).filter(([,v])=>v>0).map(([n,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${colores[n]||'#ccc'}"></div>${n} · ${fmtNum(v)} TN</div>`).join('')}</div></div>`;
}
function renderCilindro(nombre, actual, meta, pct, gradient) { const pctLabel=meta>0?((actual/meta)*100).toFixed(0)+'%':'—'; return `<div class="cyl-item"><div class="cyl-pct">${pctLabel}</div><div class="cyl-outer"><div class="cyl-fill" style="height:${Math.min(pct,100)}%;background:${gradient}"></div></div><div class="cyl-name">${nombre}</div><div style="font-size:9px;color:var(--tl)">${fmtNum(actual)} / ${meta} TN</div></div>`; }
function renderRanking(ranking) { if(!ranking?.length) return '<p style="color:var(--tl)">Sin datos</p>'; const maxTN=ranking[0]?.tnPET||1; const filas=ranking.map(c=>`<tr><td style="font-weight:700">${c.ranking}</td><td>${c.nombre}</td><td>${nivelBadge(c.nivel)}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="ranking-bar-bg"><div class="ranking-bar-fill" style="width:${(c.tnPET/maxTN)*100}%"></div></div><span style="font-size:11.5px;font-weight:600">${fmtNum(c.tnPET)} TN</span></div></td><td>$${fmtNum(c.precioPETprom,2)}/kg</td></tr>`).join(''); return `<div class="table-wrap"><table><thead><tr><th>#</th><th>Comprador</th><th>Nivel</th><th>TN PET</th><th>Precio prom.</th></tr></thead><tbody>${filas}</tbody></table></div>`; }
function dibujarLineChart(porProvMes, meses) {
  const canvas = document.getElementById('lineChartCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.clientWidth, h = 180;
  canvas.width = w; canvas.height = h;
  ctx.clearRect(0,0,w,h);
  const provConDatos = PROVINCIAS.filter(p=>meses.some(m=>porProvMes[p]?.[m]>0));
  if(!provConDatos.length) { ctx.fillStyle='var(--tl)'; ctx.font='12px Outfit'; ctx.fillText('Sin datos',10,20); return; }
  let max=0;
  provConDatos.forEach(p=>meses.forEach(m=>{ if((porProvMes[p]?.[m]||0)>max) max=porProvMes[p][m]; }));
  if(max===0) max=1;
  const stepX = w/(meses.length-1);
  provConDatos.forEach(p=>{
    ctx.beginPath();
    ctx.strokeStyle = COLORES_PROV[p];
    ctx.lineWidth = 2;
    let first=true;
    meses.forEach((m,i)=>{
      const x = i*stepX;
      const y = h-10 - ((porProvMes[p]?.[m]||0)/max)*(h-20);
      if(first) { ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
    });
    ctx.stroke();
    meses.forEach((m,i)=>{
      const x=i*stepX, y=h-10-((porProvMes[p]?.[m]||0)/max)*(h-20);
      ctx.fillStyle = COLORES_PROV[p];
      ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
    });
  });
  ctx.fillStyle='#9aafbe'; ctx.font='9px Outfit';
  for(let i=0; i<meses.length; i+=Math.ceil(meses.length/6)) {
    ctx.fillText(meses[i].substring(0,3), i*stepX-8, h-2);
  }
  const leyendaDiv = document.getElementById('chartLegend');
  if(leyendaDiv) leyendaDiv.innerHTML = `<div class="chart-legend">${provConDatos.map(p=>`<div class="legend-item"><div class="legend-line" style="background:${COLORES_PROV[p]}"></div>${p}</div>`).join('')}</div>`;
}

function renderBarrasAnio(anios, porAnio, material, color) { if(!anios?.length) return `<div class="card"><div class="card-title">TN ${material}</div><p>Sin datos</p></div>`; const maxVal=Math.max(...anios.map(a=>porAnio[a]?.[material]||0),1); return `<div class="card"><div class="card-title">TN ${material==='Suave'?'Plástico suave':material==='Duro'?'Plástico duro':'PET'}</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">${anios.map(a=>{const val=porAnio[a]?.[material]||0; const h=(val/maxVal)*90; return `<div style="display:flex;flex-direction:column;align-items:center"><div style="height:90px;display:flex;align-items:flex-end"><div style="width:18px;height:${h}px;border-radius:3px 3px 0 0;background:${color}"></div></div><div style="font-size:8.5px;color:var(--tl)">${a}</div><div style="font-size:9.5px;font-weight:600">${fmtNum(val,0)}</div></div>`;}).join('')}</div></div>`; }
function dibujarHistoricoLine(anios, porProvAnio) {
  const canvas = document.getElementById('histCanvas');
  if(!canvas || !anios?.length) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.clientWidth, h = 200;
  canvas.width = w; canvas.height = h;
  ctx.clearRect(0,0,w,h);
  const provConDatos = PROVINCIAS.filter(p=>anios.some(a=>(porProvAnio[p]?.[a]||0)>0));
  if(!provConDatos.length) return;
  let max=0;
  provConDatos.forEach(p=>anios.forEach(a=>{ if((porProvAnio[p]?.[a]||0)>max) max=porProvAnio[p][a]; }));
  if(max===0) max=1;
  const stepX = w/(anios.length-1);
  provConDatos.forEach(p=>{
    ctx.beginPath();
    ctx.strokeStyle = COLORES_PROV[p];
    ctx.lineWidth = 2;
    let first=true;
    anios.forEach((a,i)=>{
      const x = i*stepX;
      const y = h-15 - ((porProvAnio[p]?.[a]||0)/max)*(h-25);
      if(first) { ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
    });
    ctx.stroke();
    anios.forEach((a,i)=>{
      const x=i*stepX, y=h-15-((porProvAnio[p]?.[a]||0)/max)*(h-25);
      ctx.fillStyle=COLORES_PROV[p];
      ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
    });
  });
  ctx.fillStyle='#9aafbe'; ctx.font='9px Outfit';
  for(let i=0;i<anios.length;i++) ctx.fillText(anios[i], i*stepX-8, h-3);
  const leg = document.getElementById('histLegend');
  if(leg) leg.innerHTML = `<div class="chart-legend">${provConDatos.map(p=>`<div class="legend-item"><div class="legend-line" style="background:${COLORES_PROV[p]}"></div>${p}</div>`).join('')}</div>`;
}

    else showToast('Error cargando entregas');

    if(selAnio) { const cur=ENTREGAS_FILTROS.anio; selAnio.innerHTML='<option value="">Todos los años</option>'+anios.map(a=>`<option value="${a}" ${a===cur?'selected':''}>${a}</option>`).join(''); }
  } catch(e) { showToast('Error de conexión'); }
}

" value="${e?.['Destino Final']||''}" placeholder="Ej: Exportación"></div></div><div class="materiales-section" style="margin-bottom:14px"><div class="materiales-section-title">Materiales priorizables</div><div class="material-row" style="font-size:10px;font-weight:600;color:var(--tl);text-transform:uppercase"><div>Material</div><div>Kilos</div><div>Precio $/kg</div><div style="text-align:right">Valor</div></div>${priorizables.map(filaMaterial).join('')}</div><div class="materiales-section"><div class="materiales-section-title">Otros materiales</div><div class="material-row" style="font-size:10px;font-weight:600;color:var(--tl);text-transform:uppercase"><div>Material</div><div>Kilos</div><div>Precio $/kg</div><div style="text-align:right">Valor</div></div>${otros.map(filaMaterial).join('')}</div><div style="margin-top:14px;display:flex;justify-content:flex-end;gap:12px"><span style="font-weight:600">VALOR TOTAL:</span><span id="ent-total" style="font-size:22px;font-weight:700;color:var(--g2)">${e?fmtMoney(e['Valor Total']):'$0.00'}</span></div><div class="form-group"><label class="form-label">Observaciones</label><textarea class="form-textarea" id="ent-obs">${e?.Observaciones||''}</textarea></div><div class="form-group"><label class="form-label">Evidencias</label><input type="file" id="ent-evidencias" multiple accept=".pdf,.jpg,.jpeg,.png,.webp"><div class="form-hint">Se subirán varias a la vez</div>${e?.['ID_Carpeta_Evidencia']?`<a href="https://drive.google.com/drive/folders/${e['ID_Carpeta_Evidencia']}" target="_blank" class="btn btn-glass btn-sm" style="margin-top:8px"><i class="ti ti-folder"></i> Ver evidencias actuales</a>`:''}</div></div><div class="modal-foot"><button class="btn btn-glass" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="btn-guardar-entrega" onclick="guardarEntrega('${id||''}')"><i class="ti ti-check"></i> ${e?'Actualizar':'Guardar'}</button></div></div>`);

function autocompletarProvincia(idAsoc) { const aso = CAT.asociaciones.find(a=>a.ID_Asociacion===idAsoc); const input = document.getElementById('ent-provincia'); if(input) input.value = aso?.Provincia||''; }
function calcularValorMaterial(mid, nombre) {
  const kg = parseFloat(document.getElementById('mat-kg-'+mid)?.value||0);
  const precio = parseFloat(document.getElementById('mat-precio-'+mid)?.value||0);
  const venta = kg*precio;
  const elVenta = document.getElementById('mat-venta-'+mid);

  const elTotal = document.getElementById('ent-total');

async function guardarEntrega(id) {
  const fecha = document.getElementById('ent-fecha')?.value;
  const idAsoc = document.getElementById('ent-asociacion')?.value;
  const idComp = document.getElementById('ent-comprador')?.value;
  const nivel = document.getElementById('ent-nivel')?.value;
  const obs = document.getElementById('ent-obs')?.value;
  const actividad = document.getElementById('ent-actividad')?.value;
  const destino = document.getElementById('ent-destino')?.value;
  const provincia = document.getElementById('ent-provincia')?.value;
  const archivos = document.getElementById('ent-evidencias')?.files;
  if(!fecha||!idAsoc||!idComp) { showToast('Completa los campos obligatorios'); return; }
  const data = { ID_Entrega: id||'', Fecha: fecha, ID_Asociacion: idAsoc, ID_Comprador: idComp, 'Nivel Intermediacion': nivel, 'Actividad Fuente': actividad, 'Destino Final': destino, Provincia: provincia, Observaciones: obs, ID_Usuario: SESSION.email };
  const materiales = CAT.materiales.length ? CAT.materiales.map(m=>m.Nombre) : ['PET','Plástico Suave','Plástico Duro','Lata Aluminio','Vidrio','Cartón','Chatarra','Cobre','Papel Archivo','Periódico','Soplado','Tetrapak'];
  materiales.forEach(nombre=>{
    const mid = nombre.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    data[nombre+' Kilos'] = parseFloat(document.getElementById('mat-kg-'+mid)?.value||0);
    data[nombre+' Precio'] = parseFloat(document.getElementById('mat-precio-'+mid)?.value||0);
  });
  const btn = document.getElementById('btn-guardar-entrega');
  if(btn) { btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Guardando...'; }
  try {
    const res = await apiPost({ action:'saveEntrega', data });
    if(!res.ok) throw new Error(res.error||'Error');
    if(archivos && archivos.length>0 && res.folderId) {
      showToast('Subiendo evidencias...');
      await subirArchivosConcurrente(Array.from(archivos), res.folderId, (subidos,total)=>showToast(`Subiendo ${subidos}/${total}...`));
    }
    showToast(id?'Entrega actualizada ✓':'Entrega guardada ✓');
    cerrarModal();

const debouncedBuscarAsociacion = debounce((val)=>{ ASOC_BUSCAR=val.toLowerCase(); renderTablaAsociaciones(); }, 300);
function buscarAsociacion(val) { ASOC_BUSCAR=val.toLowerCase(); renderTablaAsociaciones(); }

function resetFiltrosAsoc() { ASOC_BUSCAR=''; ASOC_ESTADO=''; const b=document.getElementById('asoc-buscar'); if(b) b.value=''; const e=document.getElementById('asoc-estado-f'); if(e) e.value=''; renderTablaAsociaciones(); }
async function cargarAsociaciones() {

    const cached = cacheGet('asociaciones');

    if(res.ok) { ASOC_DATA = res.data; CAT.asociaciones = res.data.filter(a=>a.Estado==='Activa'); CAT.todasAsociaciones = res.data; cacheSet('asociaciones', res.data); renderTablaAsociaciones(); }

function renderTablaAsociaciones() {

  if(ASOC_ESTADO) data = data.filter(a=> a.Estado === ASOC_ESTADO);
  if(!data.length) { wrap.innerHTML='<div style="text-align:center;padding:60px"><i class="ti ti-building-community" style="font-size:40px"></i><p>No hay asociaciones</p></div>'; return; }

  wrap.innerHTML = `<div class="card" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Provincia</th><th>Ciudad</th><th>Tipo</th><th style="text-align:center">Recicladores</th><th>Estado</th><th>Drive</th><th></th></tr></thead><tbody>${filas}</tbody></table></div></div><div style="font-size:12px;color:var(--tl);text-align:right">${data.length} asociaciones</div>`;

function verAsociacion(id) { const a = ASOC_DATA.find(x=>x.ID_Asociacion===id); if(!a) return; abrirModal(`<div class="modal"><div class="modal-head"><div class="modal-title">${a.Nombre}</div><button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="form-grid-2"><div><div class="form-label">Provincia</div><div>${a.Provincia||'—'}</div></div><div><div class="form-label">Ciudad</div><div>${a.Ciudad||'—'}</div></div><div><div class="form-label">Tipo</div><div>${a.Tipo||'—'}</div></div><div><div class="form-label">Estado</div><div>${a.Estado==='Activa'?'<span class="badge badge-green">Activa</span>':'<span class="badge badge-warn">Inactiva</span>'}</div></div><div><div class="form-label">N° recicladores</div><div style="font-size:20px;font-weight:700">${a['Numero de Recicladores']||'—'}</div></div><div><div class="form-label">Fecha ingreso</div><div>${fmtFecha(a['Fecha Ingreso'])}</div></div></div>${a.Observaciones?`<div><div class="form-label">Observaciones</div><div>${a.Observaciones}</div></div>`:''}<div style="margin-top:20px;display:flex;gap:10px">${a.ID_Carpeta_Drive?`<a href="https://drive.google.com/drive/folders/${a.ID_Carpeta_Drive}" target="_blank" class="btn btn-glass"><i class="ti ti-folder"></i> Ver Drive</a>`:`<button class="btn btn-glass" onclick="cerrarModal();crearCarpetaAsociacion('${a.ID_Asociacion}','${a.Nombre.replace(/'/g,"\\'")}')"><i class="ti ti-folder-plus"></i> Crear carpeta</button>`}<button class="btn btn-primary" onclick="cerrarModal();abrirFormAsociacion('${a.ID_Asociacion}')"><i class="ti ti-pencil"></i> Editar</button></div></div></div>`); }

ck="guardarAsociacion('${id||''}')"><i class="ti ti-check"></i> ${a?'Actualizar':'Guardar'}</button></div></div>`); }

  const nombre = document.getElementById('aso-nombre')?.value?.trim();

function switchConfigTab(tab) { CONFIG_TAB=tab; document.querySelectorAll('[id^="cfg-tab-"]').forEach(el=>el.classList.remove('active')); document.getElementById('cfg-tab-'+tab)?.classList.add('active'); if(tab==='usuarios') renderUsuarios(); else if(tab==='materiales') renderMateriales(); else if(tab==='compradores') renderCompradoresConfig(); else if(tab==='ajustes') renderAjustes(); }
async function renderUsuarios() { document.getElementById('config-tab-content').innerHTML = `<div class="config-section"><div class="config-section-head"><div class="config-section-title"><i class="ti ti-users"></i> Usuarios</div><button class="btn btn-primary btn-sm" onclick="abrirFormUsuario()"><i class="ti ti-plus"></i> Nuevo</button></div><div style="padding:30px;text-align:center"><div class="spinner"></div></div></div>`; try { const res = await apiGet({ action:'getUsuariosTodos' }); USUARIOS_DATA = res.ok ? res.data : []; renderTablaUsuarios(); } catch(e) { showToast('Error cargando usuarios'); } }
function renderTablaUsuarios() { document.getElementById('config-tab-content').innerHTML = `<div class="config-section"><div class="config-section-head"><div class="config-section-title"><i class="ti ti-users"></i> Usuarios <span class="badge badge-blue">${USUARIOS_DATA.length}</span></div><button class="btn btn-primary btn-sm" onclick="abrirFormUsuario()"><i class="ti ti-plus"></i> Nuevo</button></div><div class="config-section-body" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th></th></tr></thead><tbody>${USUARIOS_DATA.length?USUARIOS_DATA.map(u=>`<tr><td>${u.Nombre}</td><td>${u.Email}</td><td><span class="badge ${u.Rol==='Admin'?'badge-blue':u.Rol==='Editor'?'badge-green':'badge-cyan'}">${u.Rol}</span></td><td><span class="badge ${u.Activo===true||u.Activo==='TRUE'?'badge-green':'badge-warn'}">${u.Activo===true||u.Activo==='TRUE'?'Activo':'Inactivo'}</span></td><td><div class="td-actions"><button class="btn btn-primary btn-sm" onclick="abrirFormUsuario('${u.ID_Usuario}')"><i class="ti ti-pencil"></i></button></div></td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center">No hay usuarios</td></tr>'}</tbody></table></div></div></div>`; }
function abrirFormUsuario(id=null) { const u = id?USUARIOS_DATA.find(x=>x.ID_Usuario===id):null; abrirModal(`<div class="modal" style="max-width:440px"><div class="modal-head"><div class="modal-title">${u?'Editar usuario':'Nuevo usuario'}</div><button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="usr-nombre" value="${u?.Nombre||''}"></div><div class="form-group"><label class="form-label">Email *</label><input type="email" class="form-input" id="usr-email" value="${u?.Email||''}" ${u?'readonly style="background:#f8fbfd"':''}><div class="form-hint">Solo @${DOMAIN}</div></div><div class="form-grid-2"><div class="form-group"><label class="form-label">Rol</label><select class="form-select" id="usr-rol"><option value="Admin" ${u?.Rol==='Admin'?'selected':''}>Admin</option><option value="Editor" ${u?.Rol==='Editor'?'selected':''}>Editor</option><option value="Visualizador" ${u?.Rol==='Visualizador'?'selected':''}>Visualizador</option></select></div><div class="form-group"><label class="form-label">Activo</label><select class="form-select" id="usr-activo"><option value="true" ${u?.Activo!==false?'selected':''}>Sí</option><option value="false" ${u?.Activo===false?'selected':''}>No</option></select></div></div></div><div class="modal-foot"><button class="btn btn-glass" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="btn-guardar-usr" onclick="guardarUsuario('${id||''}')"><i class="ti ti-check"></i> ${u?'Actualizar':'Guardar'}</button></div></div>`); }
async function guardarUsuario(id) { const nombre = document.getElementById('usr-nombre')?.value?.trim(); const email = document.getElementById('usr-email')?.value?.trim(); const rol = document.getElementById('usr-rol')?.value; const activo = document.getElementById('usr-activo')?.value==='true'; if(!nombre||!email) { showToast('Nombre y email obligatorios'); return; } if(!email.endsWith('@'+DOMAIN)) { showToast('Correo no válido'); return; } const btn = document.getElementById('btn-guardar-usr'); if(btn) { btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Guardando...'; } try { const res = await apiPost({ action:'saveUsuario', data:{ ID_Usuario:id||'', Nombre:nombre, Email:email, Rol:rol, Activo:activo } }); if(!res.ok) throw new Error(res.error); showToast(id?'Usuario actualizado ✓':'Usuario creado ✓'); cerrarModal(); await renderUsuarios(); } catch(e) { showToast('Error al guardar'); } finally { if(btn) { btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; } } }
function renderMateriales() { document.getElementById('config-tab-content').innerHTML = `<div class="config-section"><div class="config-section-head"><div class="config-section-title"><i class="ti ti-recycle"></i> Materiales <span class="badge badge-blue">${CAT.materiales.length}</span></div><button class="btn btn-primary btn-sm" onclick="abrirFormMaterial()"><i class="ti ti-plus"></i> Nuevo</button></div><div class="config-section-body" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Priorizable</th><th>Activo</th><th></th></tr></thead><tbody>${CAT.materiales.length?CAT.materiales.map(m=>`<tr><td>${m.Nombre}</td><td>${m.Priorizable==='Sí'||m.Priorizable===true?'<span class="badge badge-cyan">Sí</span>':'No'}</td><td><span class="badge ${m.Activo===true||m.Activo==='TRUE'?'badge-green':'badge-warn'}">${m.Activo===true||m.Activo==='TRUE'?'Activo':'Inactivo'}</span></td><td><div class="td-actions"><button class="btn btn-primary btn-sm" onclick="abrirFormMaterial('${m.ID_Material}')"><i class="ti ti-pencil"></i></button></div></td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center">No hay materiales</td></tr>'}</tbody></table></div></div></div>`; }
function abrirFormMaterial(id=null) { const m = id?CAT.materiales.find(x=>x.ID_Material===id):null; abrirModal(`<div class="modal" style="max-width:400px"><div class="modal-head"><div class="modal-title">${m?'Editar material':'Nuevo material'}</div><button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="mat-nombre" value="${m?.Nombre||''}"></div><div class="form-grid-2"><div class="form-group"><label class="form-label">Priorizable</label><select class="form-select" id="mat-prio"><option value="Sí" ${m?.Priorizable==='Sí'?'selected':''}>Sí</option><option value="No" ${m?.Priorizable!=='Sí'?'selected':''}>No</option></select></div><div class="form-group"><label class="form-label">Activo</label><select class="form-select" id="mat-activo"><option value="true" ${m?.Activo!==false?'selected':''}>Sí</option><option value="false" ${m?.Activo===false?'selected':''}>No</option></select></div></div></div><div class="modal-foot"><button class="btn btn-glass" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="btn-guardar-mat" onclick="guardarMaterial('${id||''}')"><i class="ti ti-check"></i> ${m?'Actualizar':'Guardar'}</button></div></div>`); }
async function guardarMaterial(id) { const nombre = document.getElementById('mat-nombre')?.value?.trim(); const prio = document.getElementById('mat-prio')?.value; const activo = document.getElementById('mat-activo')?.value==='true'; if(!nombre) { showToast('Nombre obligatorio'); return; } const btn = document.getElementById('btn-guardar-mat'); if(btn) { btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Guardando...'; } try { const res = await apiPost({ action:'saveMaterial', data:{ ID_Material:id||'', Nombre:nombre, Priorizable:prio, Activo:activo } }); if(!res.ok) throw new Error(res.error); showToast(id?'Material actualizado ✓':'Material creado ✓'); cerrarModal(); const mats = await apiGet({ action:'getMateriales' }); if(mats.ok) CAT.materiales = mats.data; renderMateriales(); } catch(e) { showToast('Error al guardar'); } finally { if(btn) { btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; } } }
function renderCompradoresConfig() { document.getElementById('config-tab-content').innerHTML = `<div class="config-section"><div class="config-section-head"><div class="config-section-title"><i class="ti ti-truck"></i> Compradores <span class="badge badge-blue">${CAT.compradores.length}</span></div><button class="btn btn-primary btn-sm" onclick="abrirFormCompradorUnificado()"><i class="ti ti-plus"></i> Nuevo</button></div><div class="config-section-body" style="padding:0"><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Nivel</th><th>Destino final</th><th>Provincia</th><th>Activo</th><th></th></tr></thead><tbody>${CAT.compradores.length?CAT.compradores.map(c=>`<tr><td>${c.Nombre}</td><td>${nivelBadge(c['Nivel Intermediacion'])}</td><td>${c['Destino Final']||'—'}</td><td>${c.Provincia||'—'}</td><td><span class="badge ${c.Activo===true||c.Activo==='TRUE'?'badge-green':'badge-warn'}">${c.Activo===true||c.Activo==='TRUE'?'Sí':'No'}</span></td><td><div class="td-actions"><button class="btn btn-primary btn-sm" onclick="abrirFormCompradorUnificado('${c.ID_Comprador}')"><i class="ti ti-pencil"></i></button></div></td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center">No hay compradores</td></tr>'}</tbody></table></div></div></div>`; }
function renderAjustes() { document.getElementById('config-tab-content').innerHTML = `<div class="config-section"><div class="config-section-head"><div class="config-section-title"><i class="ti ti-settings-2"></i> Ajustes generales</div></div><div class="config-section-body"><div class="form-group"><label class="form-label">ID Carpeta raíz Drive</label><input type="text" class="form-input" value="${DRIVE_FOLDER_ROOT}" readonly style="background:#f8fbfd;font-family:monospace"><div class="form-hint">Carpeta raíz de evidencias.</div></div><div><a href="https://drive.google.com/drive/folders/${DRIVE_FOLDER_ROOT}" target="_blank" class="btn btn-glass btn-sm"><i class="ti ti-folder"></i> Abrir en Drive</a></div><div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)"><div class="form-label">Apps Script URL</div><div style="font-size:11px;font-family:monospace;background:#f8fbfd;padding:10px;border-radius:var(--radius-sm)">${SCRIPT_URL}</div></div><div style="margin-top:24px;padding-top:20px;"><div style="font-weight:600">ReCircula 360 · v2.0 · 2026</div><div>Redes Con Rostro</div></div></div></div>`; }

// Inicialización
window.addEventListener('load', async () => {
  if(recuperarSesion()) {
    mostrarLoading();
    await cargarCatalogos();
    mostrarApp();
    const iniciales = SESSION.nombre.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('user-avatar').textContent = iniciales;
    document.getElementById('user-name').textContent = SESSION.nombre;
    document.getElementById('user-role').textContent = SESSION.rol;
    if(SESSION.rol==='Admin') document.querySelectorAll('.admin-only').forEach(el=>el.classList.remove('hidden'));
    navTo('dashboard');
  } else mostrarLogin();
});
</script>
