<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ambiental - Programa ReCircula</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA: LOADING
     ══════════════════════════════════════════════════════════ -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando ReCircula 360...</div>
</div>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA: APP PRINCIPAL
     ══════════════════════════════════════════════════════════ -->
<div id="screen-app" class="hidden">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo grad-text">Dashboard Ambiental</div>
      <div class="sb-sub">Programa ReCircula</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Principal</div>
      <div class="sb-item active" onclick="navTo('dashboard')" id="nav-dashboard">
        <i class="ti ti-chart-bar"></i> Dashboard
      </div>
      <div class="sb-item" onclick="navTo('entregas')" id="nav-entregas">
        <i class="ti ti-package"></i> Entregas
      </div>
      <div class="sb-item" onclick="navTo('asociaciones')" id="nav-asociaciones">
        <i class="ti ti-building-community"></i> Asociaciones
      </div>
      <div class="sb-item" onclick="navTo('accesos')" id="nav-accesos">
        <i class="ti ti-link"></i> Accesos
      </div>
      <div class="sb-section" style="margin-top:8px">Admin</div>
      <div class="sb-item admin-only hidden" onclick="navTo('configuracion')" id="nav-configuracion">
        <i class="ti ti-settings"></i> Configuración
      </div>
    </div>
    <div class="sb-foot">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
     <button class="btn-logout" onclick="window.location.href=HUB_URL" style="margin-bottom:6px">
  <i class="ti ti-home"></i> Hub principal
</button>
<button class="btn-logout" onclick="cerrarSesion()">
  <i class="ti ti-logout"></i> Cerrar sesión
</button>
    </div>
  </nav>

  <!-- ÁREA PRINCIPAL -->
  <div class="main-area">
    <div class="main-topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="ti ti-menu-2"></i>
      </button>
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="main-content" id="main-content"></div>
  </div>
</div>

<!-- Sidebar backdrop (móvil) -->
<div id="sidebar-backdrop" class="sidebar-backdrop" onclick="toggleSidebar(false)"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Scripts — orden importante -->
<script src="app.js"></script>
<script src="dashboard.js"></script>
<script src="entregas.js"></script>
<script src="accesos.js"></script>
<script src="asociaciones.js"></script>
<script src="configuracion.js"></script>


</body>
</html>
