<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCircula 360 - Plataforma de sistematización</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ============================================================
   RECIRCULA 360 — Estilos globales
   ============================================================ */

/* ── Tokens de diseño ───────────────────────────────────── */
:root {
  --b1: #002343;
  --b2: #0778bf;
  --g1: #5bbd70;
  --g2: #00bda4;
  --c1: #86d2da;
  --c2: #079fff;
  --tx: #1b1b1b;
  --tm: #5a6a7a;
  --tl: #9aafbe;
  --bg: linear-gradient(135deg, #e4f4fb, #eef4ff, #e4fbf7);
  --surface: #ffffff;
  --border: rgba(0, 35, 67, 0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --sidebar-w: 224px;
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Utilidades ─────────────────────────────────────────── */
.hidden { display: none !important; }

.grad-text {
  background: linear-gradient(90deg, var(--c1), var(--c2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Botones ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); transition: transform 0.1s; }
.btn-primary { background: #fff; border-color: var(--b2); color: var(--b2); }
.btn-primary:hover { background: #f0f7ff; }
.btn-success { background: #fff; border-color: var(--g2); color: var(--g2); }
.btn-success:hover { background: #f0fbf8; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-danger:hover { background: #fff0f3; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-sm { padding: 6px 13px; font-size: 12px; }

/* ── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 18px 20px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-tag {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--b2);
  background: #e8f4fb;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e4f4fb; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-cyan  { background: #e4f8fb; color: #0569a0; }
.badge-warn  { background: #fff8e4; color: #854f0b; }
.badge-red   { background: #fff0f3; color: #c91a44; }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--b1);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Spinner ─────────────────────────────────────────────── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b2);
  border-radius: 50%;
}
.spinner.active { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   LOGIN
   ============================================================ */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 48px 44px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0, 35, 67, 0.08);
}

.login-logo {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.login-tagline {
  font-size: 13px;
  color: var(--tm);
  margin-bottom: 36px;
}

.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b2); }

.login-google-icon { width: 20px; height: 20px; }

.login-domain-note {
  margin-top: 16px;
  font-size: 11.5px;
  color: var(--tl);
}

/* ============================================================
   LOADING
   ============================================================ */
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.load-text {
  font-size: 14px;
  color: var(--tm);
  font-weight: 500;
}

/* ============================================================
   APP PRINCIPAL
   ============================================================ */
#screen-app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: transform 0.25s;
}

.sb-head {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sb-logo { font-size: 17px; font-weight: 800; }

.sb-sub {
  font-size: 11px;
  color: var(--tm);
  margin-top: 2px;
}

.sb-nav {
  padding: 12px 10px;
  flex: 1;
  overflow-y: auto;
}

.sb-section {
  font-size: 10px;
  font-weight: 700;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 10px 10px 4px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--tm);
  margin-bottom: 2px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.sb-item:hover { background: #f0f7fb; color: var(--b2); }
.sb-item.active {
  background: linear-gradient(135deg, #e4f4fb, #eef8ff);
  color: var(--b1);
  font-weight: 600;
}
.sb-item i { font-size: 18px; flex-shrink: 0; }
.sb-item.admin-only { color: #b8c8d4; }
.sb-item.admin-only:hover { background: #f8fbfd; color: var(--tl); }

.sb-foot {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}

.user-chip { display: flex; align-items: center; gap: 10px; }

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.user-name { font-size: 13px; font-weight: 600; color: var(--tx); }
.user-role { font-size: 11px; color: var(--tm); }

.btn-logout {
  margin-top: 10px;
  width: 100%;
  padding: 7px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }

/* ── Área principal ──────────────────────────────────────── */
.main-area {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 12px;
}

.topbar-title { font-size: 19px; font-weight: 700; color: var(--b1); }
.topbar-sub   { font-size: 12px; color: var(--tm); margin-top: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.mobile-menu-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  color: var(--b1);
  font-size: 20px;
  flex-shrink: 0;
}

.main-content {
  flex: 1;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ============================================================
   FILTROS SUPERIORES
   ============================================================ */
.filters-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: #fff;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 11px 16px;
}

.filter-label-inline {
  font-size: 11px;
  font-weight: 600;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.filter-select-sm {
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 12.5px;
  color: var(--tx);
  background: #f8fbfd;
  cursor: pointer;
  min-width: 110px;
  transition: border-color 0.15s;
}
.filter-select-sm:focus { outline: none; border-color: var(--b2); }

.filter-divider {
  width: 1px; height: 22px;
  background: var(--border);
  margin: 0 2px;
}

.btn-reset-filters {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tl);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s, border-color 0.15s;
}
.btn-reset-filters:hover { color: var(--b2); border-color: var(--b2); }

/* ============================================================
   PESTAÑAS
   ============================================================ */
.tabs-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  transition: color 0.15s, background 0.15s;
  font-family: 'Outfit', sans-serif;
}
.tab-btn:hover { color: var(--b2); }
.tab-btn.active {
  background: #fff;
  color: var(--b1);
  border-color: var(--border);
  margin-bottom: -1px;
}

/* ============================================================
   MODALES - SIN BLUR (OPTIMIZADO)
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 35, 67, 0.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 35, 67, 0.15);
}

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

.modal-title { font-size: 16px; font-weight: 700; color: var(--b1); }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }

.modal-body { padding: 20px 24px; }

.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ============================================================
   FORMULARIOS
   ============================================================ */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
  transition: border-color 0.15s;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--b2);
  box-shadow: 0 0 0 3px rgba(7, 120, 191, 0.08);
}
.form-textarea { resize: vertical; min-height: 80px; }

.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.form-hint {
  font-size: 11px;
  color: var(--tl);
  margin-top: 4px;
}

/* ── Sección de materiales en formulario entrega ─────────── */
.materiales-section {
  background: #f8fbfd;
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border);
}

.materiales-section-title {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--b1);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

.material-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}

.material-row-label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--tx);
}

.material-priorizable {
  border-left: 3px solid var(--c2);
  padding-left: 8px;
}

.material-valor {
  font-size: 12px;
  font-weight: 600;
  color: var(--g2);
  text-align: right;
}

/* ============================================================
   TABLAS
   ============================================================ */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid #f0f4f8;
  color: var(--tx);
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }

.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }

/* ============================================================
   DASHBOARD — KPIs
   ============================================================ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.kpi-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  border: 1px solid var(--border);
}

.kpi-label {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--b1);
  line-height: 1;
}

.kpi-unit {
  font-size: 13px;
  font-weight: 400;
  color: var(--tm);
}

.kpi-note {
  font-size: 10.5px;
  color: var(--tl);
  margin-top: 4px;
}

.kpi-bar {
  height: 4px;
  border-radius: 4px;
  background: #eef2f6;
  margin-top: 10px;
  overflow: hidden;
}

.kpi-fill { height: 100%; border-radius: 4px; }
.kpi-fill-blue  { background: linear-gradient(90deg, var(--b1), var(--b2)); }
.kpi-fill-green { background: linear-gradient(90deg, var(--g1), var(--g2)); }
.kpi-fill-cyan  { background: linear-gradient(90deg, var(--c1), var(--c2)); }
.kpi-fill-warn  { background: linear-gradient(90deg, #f5ad21, #9fda60); }

/* ── Dashboard grids ─────────────────────────────────────── */
.dash-charts-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1.4fr);
  gap: 14px;
}

.dash-bottom-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 14px;
}

.dash-hist-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 14px;
}

/* ── Leyenda de gráficos ─────────────────────────────────── */
.chart-legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--tm);
}

.legend-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-line {
  width: 14px; height: 2.5px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Colectivos beneficiarios ────────────────────────────── */
.asoc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.asoc-chip {
  padding: 5px 9px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 500;
  background: #f0f7fb;
  color: var(--b1);
  border: 1px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Ranking compradores ─────────────────────────────────── */
.ranking-bar-bg {
  flex: 1;
  height: 7px;
  background: #f0f4f8;
  border-radius: 4px;
  overflow: hidden;
}

.ranking-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--b1), var(--b2));
}

/* ── Cilindros de avance ─────────────────────────────────── */
.cylinders-wrap {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  height: 110px;
  padding: 0 8px;
}

.cyl-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.cyl-pct {
  font-size: 13px;
  font-weight: 700;
  color: var(--b1);
}

.cyl-outer {
  width: 34px; height: 70px;
  border-radius: 17px;
  background: #eef2f6;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.cyl-fill {
  width: 100%;
  border-radius: 17px;
  transition: height 0.6s ease;
}

.cyl-name {
  font-size: 10px;
  color: var(--tm);
  font-weight: 500;
  text-align: center;
}

/* ============================================================
   ACCESOS
   ============================================================ */
.accesos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

<!-- Scripts — versión OPTIMIZADA -->
<script>
// ============================================================
// RECIRCULA 360 — app.js (OPTIMIZADO)
// Constantes, API, navegación, helpers globales
// ============================================================

// ── Constantes ───────────────────────────────────────────────
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbzoOqPPbbOGh894CiDXny-8l44vp7JhluXcdORGz6s4dx_JDgOSX2ZXsPpGxfBJ59XK/exec';
const G_CLIENT_ID  = '783730193199-d7nhahv3ou4rmps7nrpoop5cpor079ej.apps.googleusercontent.com';
const DOMAIN       = 'redesconrostro.org';
const DRIVE_FOLDER_ROOT = '1AQyBa9AAdVzukBaZxWa7jpSN2DYkoFhv';
const SHEET_ID = '1WwvL0kna3SiFrByvlV4kJjJ1An7Dz4OYMDb6SCz8VD0';
const SHEETS_API = 'https://sheets.googleapis.com/v4/spreadsheets';

// ── Estado global ────────────────────────────────────────────
let SESSION      = null;
let ACCESS_TOKEN = null;
let TOKEN_EXPIRY = 0;

let CAT = {
  asociaciones: [],
  compradores:  [],
  materiales:   [],
  accesos:      [],
};

// ============================================================
// LOGIN / OAUTH
// ============================================================

function iniciarLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: G_CLIENT_ID,
    scope: 'email profile https://www.googleapis.com/auth/drive.file',
    callback: async (resp) => {
      if (resp.error) { showToast('Error al iniciar sesión'); return; }
      ACCESS_TOKEN = resp.access_token;
      TOKEN_EXPIRY = Date.now() + (resp.expires_in - 60) * 1000;
      await verificarUsuario();
    },
  });
  client.requestAccessToken();
}

async function verificarUsuario() {
  mostrarLoading();
  try {
    const res  = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN }
    });
    const info = await res.json();

    if (!info.email.endsWith('@' + DOMAIN)) {
      showToast('Solo cuentas @' + DOMAIN + ' tienen acceso');
      mostrarLogin();
      return;
    }

    const data = await apiGet({ action: 'getUsuario', email: info.email });
    if (!data.ok) {
      showToast('Usuario no autorizado. Contacta al administrador.');
      mostrarLogin();
      return;
    }

    SESSION = {
      nombre: data.data.nombre || info.given_name,
      email:  info.email,
      rol:    data.data.rol,
      foto:   info.picture,
    };

    sessionStorage.setItem('rcr_session',   JSON.stringify(SESSION));
    sessionStorage.setItem('rcr_token',     ACCESS_TOKEN);
    sessionStorage.setItem('rcr_token_exp', TOKEN_EXPIRY);

    await iniciarApp();
  } catch (e) {
    console.error(e);
    showToast('Error de conexión. Intenta de nuevo.');
    mostrarLogin();
  }
}

function recuperarSesion() {
  const s   = sessionStorage.getItem('rcr_session');
  const t   = sessionStorage.getItem('rcr_token');
  const exp = sessionStorage.getItem('rcr_token_exp');
  if (s && t && exp && Date.now() < parseInt(exp)) {
    SESSION      = JSON.parse(s);
    ACCESS_TOKEN = t;
    TOKEN_EXPIRY = parseInt(exp);
    return true;
  }
  return false;
}

function cerrarSesion() {
  sessionStorage.clear();
  SESSION      = null;
  ACCESS_TOKEN = null;
  CAT          = { asociaciones: [], compradores: [], materiales: [], accesos: [] };
  mostrarLogin();
  try { google.accounts.id.disableAutoSelect(); } catch(e) {}
}

// ============================================================
// INICIAR APP
// ============================================================

async function iniciarApp() {
  const iniciales = SESSION.nombre
    .split(' ')
    .map(n => n[0])
    .join('')
    .substring(0, 2)
    .toUpperCase();

  document.getElementById('user-avatar').textContent = iniciales;
  document.getElementById('user-name').textContent   = SESSION.nombre;
  document.getElementById('user-role').textContent   = SESSION.rol;

  if (SESSION.rol === 'Admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
  }

  await cargarCatalogos();
  mostrarApp();
  navTo('dashboard');
}

// ============================================================
// CACHÉ LOCAL CON TTL (OPTIMIZADO)
// ============================================================
const CACHE = new Map();
const CACHE_TTL = 30 * 60 * 1000;

function cacheSet(key, data, ttl = CACHE_TTL) {
  try {
    CACHE.set(key, { data, expiry: Date.now() + ttl });
    localStorage.setItem('rcr_' + key, JSON.stringify({ data, expiry: Date.now() + ttl }));
  } catch(e) {}
}

function cacheGet(key, forceRefresh = false) {
  if (forceRefresh) {
    CACHE.delete(key);
    try { localStorage.removeItem('rcr_' + key); } catch(e) {}
    return null;
  }
  
  const cached = CACHE.get(key);
  if (cached && Date.now() < cached.expiry) return cached.data;
  
  try {
    const raw = localStorage.getItem('rcr_' + key);
    if (raw) {
      const { data, expiry } = JSON.parse(raw);
      if (Date.now() < expiry) {
        CACHE.set(key, { data, expiry });
        return data;
      }
      localStorage.removeItem('rcr_' + key);
    }
  } catch(e) {}
  
  CACHE.delete(key);
  return null;
}

function cacheClear(key) {
  CACHE.delete(key);
  try { localStorage.removeItem('rcr_' + key); } catch(e) {}
}

async function cargarCatalogos() {
  try {
    const cached = cacheGet('cat_todos');
    if (cached) {
      CAT = { ...CAT, ...cached };
      setTimeout(() => actualizarCatalogosBackground(), 500);
      return;
    }
    await actualizarCatalogos();
  } catch(e) {
    console.error('Error cargando catálogos:', e);
  }
}

async function actualizarCatalogos() {
  try {
    const res = await apiGet({ action: 'getCatalogos', rol: SESSION.rol });
    if (res.ok) {
      CAT = { ...CAT, ...res.data };
      cacheSet('cat_todos', res.data);
    }
  } catch(e) {
    console.error('Error actualizando catálogos:', e);
  }
}

async function actualizarCatalogosBackground() {
  await actualizarCatalogos();
}

function invalidarCache(tipo) {
  cacheClear('cat_todos');
}

// ============================================================
// SHEETS API DIRECTA
// ============================================================

async function sheetsGet(sheetName, filtros = {}) {
  try {
    const url = `${SHEETS_API}/${SHEET_ID}/values/${encodeURIComponent(sheetName)}`;
    const res = await fetch(url, {
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN }
    });
    if (!res.ok) throw new Error('Error Sheets API');
    const json = await res.json();
    const rows = json.values || [];
    if (rows.length < 2) return [];
    const headers = rows[0];
    let data = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });
    Object.entries(filtros).forEach(([key, val]) => {
      if (val) data = data.filter(r => r[key] === val);
    });
    return data;
  } catch(e) {
    console.error('Error Sheets API:', e);
    return null;
  }
}

// ============================================================
// NAVEGACIÓN
// ============================================================

function navTo(seccion) {
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + seccion);
  if (navEl) navEl.classList.add('active');

  const titulos = {
    dashboard:     { titulo: 'Dashboard ambiental',        sub: null },
    entregas:      { titulo: 'Entregas',                   sub: 'Registro de entregas de material' },
    asociaciones:  { titulo: 'Asociaciones',               sub: 'Gestión de asociaciones recicladores' },
    accesos:       { titulo: 'Accesos',                    sub: 'Links y recursos del equipo' },
    configuracion: { titulo: 'Configuración',              sub: 'Solo administradores' },
  };

  const info = titulos[seccion] || { titulo: seccion, sub: '' };
  document.getElementById('topbar-title').textContent = info.titulo;
  document.getElementById('topbar-sub').textContent   =
    seccion === 'dashboard'
      ? 'Bienvenido, ' + SESSION.nombre.split(' ')[0] + ' 👋'
      : (info.sub || '');

  document.getElementById('main-content').innerHTML    = '';
  document.getElementById('topbar-actions').innerHTML  = '';

  switch (seccion) {
    case 'dashboard':     renderDashboard();     break;
    case 'entregas':      renderEntregas();      break;
    case 'asociaciones':  renderAsociaciones();  break;
    case 'accesos':       renderAccesos();       break;
    case 'configuracion': renderConfiguracion(); break;
    default:
      document.getElementById('main-content').innerHTML =
        '<div class="card"><p style="color:var(--tm)">Sección no encontrada.</p></div>';
  }
}

// ============================================================
// API HELPERS
// ============================================================

async function apiGet(params) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(SCRIPT_URL + '?' + qs);
  if (!res.ok) throw new Error('Error HTTP ' + res.status);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body:   JSON.stringify(body),
  });
  if (!res.ok) throw new Error('Error HTTP ' + res.status);
  return res.json();
}

async function subirDrive(file, folderId, nombre) {
  const metadata = {
    name:    nombre || file.name,
    parents: [folderId],
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);

  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {
      method:  'POST',
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN },
      body:    form,
    }
  );
  return res.json();
}

// ============================================================
// UI HELPERS
// ============================================================

function mostrarLogin() {
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-app').classList.add('hidden');

function mostrarLoading() {

function mostrarApp() {

  document.getElementById('screen-app').classList.remove('hidden');

// ── Modales (SIN MEMORY LEAK) ───────────────────────────────
function abrirModal(html) {
  cerrarModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id        = 'modal-overlay';
  overlay.innerHTML = html;
  
  const handleClose = (e) => {
    if (e.target === overlay) cerrarModal();
  };
  
  overlay.addEventListener('click', handleClose);
  document.body.appendChild(overlay);
}

function cerrarModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ── Formateo ─────────────────────────────────────────────────
function fmtNum(n, dec = 2) {
  if (!n && n !== 0) return '—';
  return parseFloat(n).toLocaleString('es-EC', {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec,
  });
}

function fmtMoney(n) {
  if (!n && n !== 0) return '—';
  return '$' + parseFloat(n).toLocaleString('es-EC', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

function fmtTN(n) {
  if (!n && n !== 0) return '—';
  return fmtNum(n) + ' TN';
}

function fmtFecha(f) {
  if (!f) return '—';
  const d = new Date(f);
  if (isNaN(d)) return f;
  return d.toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
}

function nivelBadge(nivel) {
  const map = {
    'Nivel 1': 'badge-blue',
    'Nivel 2': 'badge-green',
    'Nivel 3': 'badge-warn',
    'Transformador': 'badge-cyan',
  };
  const cls = map[nivel] || 'badge-blue';
  return `<span class="badge ${cls}">${nivel || '—'}</span>`;
}

// ============================================================
// INICIO
// ============================================================
window.addEventListener('load', async () => {
  if (recuperarSesion()) {
    mostrarLoading();
    await cargarCatalogos();
    mostrarApp();

    const iniciales = SESSION.nombre.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    document.getElementById('user-avatar').textContent = iniciales;
    document.getElementById('user-name').textContent   = SESSION.nombre;
    document.getElementById('user-role').textContent   = SESSION.rol;

      document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
    }

    navTo('dashboard');
  } else {
    mostrarLogin();
  }
});
